<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa Admin | Code Generator</title>
    <style>
        :root { --bg: #050505; --cyan: #00f2ff; --card: #111; --border: rgba(255,255,255,0.1); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; padding: 20px; }
        .admin-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; max-width: 600px; margin: auto; }
        input, select { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: #fff; margin-bottom: 15px; }
        .gen-btn { width: 100%; background: var(--cyan); color: #000; border: none; padding: 15px; border-radius: 15px; font-weight: 900; cursor: pointer; }
        
        /* 📜 THE OUTPUT BOX */
        #output { width: 100%; height: 120px; background: #000; color: #0f0; border: 1px solid #333; border-radius: 12px; padding: 15px; font-family: 'Courier New', monospace; margin-top: 20px; font-size: 12px; }
        .copy-hint { font-size: 11px; color: #555; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h2 style="color:var(--cyan); font-size:16px;">🚀 NEXA CODE GENERATOR</h2>
        
        <label>Game ID</label>
        <select id="gId">
            <option value="ff">Free Fire</option>
            <option value="bgmi">BGMI</option>
            <option value="mc">Minecraft</option>
        </select>

        <label>Product Name</label>
        <input type="text" id="pName" placeholder="e.g. Rare ID Lvl 70">

        <label>Price</label>
        <input type="text" id="pPrice" placeholder="e.g. 1,499">

        <button class="gen-btn" onclick="generateCode()">GENERATE CODE 🛠️</button>

        <textarea id="output" readonly placeholder="यहाँ कोड जनरेट होगा..."></textarea>
        <div class="copy-hint">इसे कॉपी करके products.js में पेस्ट करें 😏</div>
    </div>

    <script>
        function generateCode() {
            const id = document.getElementById('gId').value;
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;

            if(!name || !price) return alert("भाई, फॉर्म भरो! 😏");

            const code = `{ game: "${id}", name: "${name}", price: "${price}" },`;
            document.getElementById('output').value += code + "\n";
            alert("Code Generated! नीचे से कॉपी कर लो।");
        }
    </script>
</body>
</html>
