<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexa Vault | v0.040 Final Boss</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505; --card: #0d0d0d; --cyan: #00f2ff;
            --border: rgba(255,255,255,0.08); --red: #ff3c3c; --orange: #ff9d00;
            --sidebar-w: 280px; --anim-ios: cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        /* ⬇️ HEADER: THE BULLSEYE ALIGNMENT ⬇️ */
        #header { 
            display: flex; align-items: center; padding: 0 16px; height: 75px; 
            background: #050505; border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(20px); position: relative;
        }

        .menu-btn { position: absolute; left: 16px; z-index: 2100; padding: 10px; cursor: pointer; }
        .logo-main-left { position: absolute; left: 65px; height: 38px; width: 38px; border-radius: 50%; object-fit: cover; z-index: 2100; }
        
        .brand-hub { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); height: 55px; display: flex; align-items: center; justify-content: center; }
        .brand-text { height: 100%; object-fit: contain; filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.3)); }

        /* ⬇️ SIDEBAR MENU ⬇️ */
        #sidebar { 
            position: fixed; top: 0; left: 0; width: var(--sidebar-w); height: 100%; 
            background: #080808; transform: translateX(-100%); transition: 0.4s var(--anim-ios); 
            z-index: 2500; padding: 90px 24px; border-right: 1px solid var(--border);
            box-shadow: 20px 0 50px rgba(0,0,0,0.8);
        }
        #sidebar.active { transform: translateX(0); }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); opacity: 0; pointer-events: none; transition: 0.3s; z-index: 2200; }
        #overlay.active { opacity: 1; pointer-events: auto; }

        /* ⬇️ GAMES SCROLL: 24PX CURVE & HAPTICS ⬇️ */
        .games-area { display: flex; gap: 18px; padding: 25px 18px; overflow-x: auto; scrollbar-width: none; scroll-snap-type: x mandatory; }
        .games-area::-webkit-scrollbar { display: none; }
        
        .game-item { min-width: 75px; text-align: center; cursor: pointer; position: relative; scroll-snap-align: center; transition: 0.2s; }
        .game-item:active { transform: scale(0.9); } /* 🚀 REAL APP FEEL 🚀 */

        .frame { 
            width: 70px; height: 70px; border-radius: 22px; 
            border: 2.5px solid #151515; background: var(--card);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            transition: 0.4s var(--anim-ios);
        }
        .frame img { width: 100%; height: 100%; object-fit: contain; padding: 8px; opacity: 0.7; transition: 0.3s; }

        .game-item.active .frame { border-color: var(--cyan); transform: translateY(-12px); box-shadow: 0 0 30px rgba(0, 242, 255, 0.25); }
        .game-item.active .frame img { opacity: 1; transform: scale(1.1); }
        .game-item.active .badge { transform: translateY(-12px); }

        .badge { position: absolute; top: -6px; right: -6px; font-size: 8px; font-weight: 900; padding: 3px 7px; border-radius: 6px; text-transform: uppercase; color: #fff; z-index: 10; animation: pop 0.4s var(--anim-ios); }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
        .trending { background: var(--red); } .hot { background: var(--orange); color: #000; }

        .label { font-size: 9px; margin-top: 14px; color: #555; font-weight: 800; text-transform: uppercase; transition: 0.3s; }
        .game-item.active .label { color: #fff; }

        /* ⬇️ STORE SECTION ⬇️ */
        #store-section { padding: 15px; border-top: 1px solid var(--border); min-height: 400px; }
        .store-header { font-family: 'Orbitron', sans-serif; font-size: 12px; color: var(--cyan); margin-bottom: 25px; letter-spacing: 1px; }
        .product-card { background: var(--card); border-radius: 20px; padding: 22px; margin-bottom: 18px; border: 1px solid var(--border); position: relative; transition: 0.3s; }
        .p-price { font-size: 20px; font-weight: 900; color: #fff; }
        .buy-btn { width: 100%; padding: 15px; background: #fff; color: #000; border-radius: 12px; font-weight: 900; margin-top: 15px; border: none; font-size: 11px; text-transform: uppercase; }
        .buy-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <header id="header">
        <div class="menu-btn" onclick="toggleMenu()"><img src="https://cdn-icons-png.flaticon.com/512/8166/8166827.png" height="22" style="filter:invert(1)"></div>
        <img src="assets/logo.png" alt="X" class="logo-main-left">
        <div class="brand-hub"><img src="assets/nexa-vault-brand.png" alt="NEXA" class="brand-text"></div>
        <div style="width: 44px;"></div>
    </header>

    <div id="sidebar">
        <div style="color:var(--cyan); font-family:Orbitron; font-weight:900; font-size:18px; margin-bottom:40px; letter-spacing:1px;">NEXA SYSTEM</div>
        <div style="color:#555; font-size:14px; font-weight:700; margin-bottom:25px;">Marketplace</div>
        <div style="color:#555; font-size:14px; font-weight:700; margin-bottom:25px;">My Wallet</div>
        <div style="color:#555; font-size:14px; font-weight:700;">Support 📞</div>
    </div>
    <div id="overlay" onclick="toggleMenu()"></div>

    <div class="games-area" id="games_box"></div>

    <div id="store-section">
        <div class="store-header" id="selected_game"></div>
        <div id="store_grid"></div>
    </div>

    <script src="config.js"></script>
    <script src="products.js"></script>
    
    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        // 💰 REAL PRODUCT ENGINE 💰
        function loadStore(id) {
            const grid = document.getElementById("store_grid");
            const title = document.getElementById("selected_game");
            grid.style.opacity = "0";

            setTimeout(() => {
                const gameName = (typeof GAME_NAMES !== 'undefined') ? GAME_NAMES[id].name : id;
                title.innerText = `NEXA VAULT • ${gameName.toUpperCase()}`;
                
                const filtered = (typeof PRODUCTS !== 'undefined') ? PRODUCTS.filter(p => p.game === id) : [];
                
                if(filtered.length === 0) {
                    grid.innerHTML = `<p style="text-align:center; padding:50px; color:#333; font-size:12px;">स्टॉक अभी खाली है, भाई 🥲</p>`;
                } else {
                    grid.innerHTML = filtered.map(p => `
                        <div class="product-card">
                            <span style="color:#00ff88; font-size:9px; font-weight:800; text-transform:uppercase;">✓ Verified Seller</span>
                            <div style="font-size:17px; font-weight:800; margin:8px 0;">${p.name}</div>
                            <div class="p-price"><span style="color:var(--cyan); font-size:12px; margin-right:4px;">₹</span>${p.price}</div>
                            <button class="buy-btn" onclick="window.open('https://wa.me/91XXXXXXXXXX?text=Order:${p.name}')">Order via WhatsApp</button>
                        </div>
                    `).join("");
                }
                grid.style.opacity = "1";
            }, 200);
        }

        // 🚀 SMART INIT LOOP 🚀
        const gameSource = (typeof GAME_NAMES !== 'undefined') ? GAME_NAMES : {};
        Object.keys(gameSource).forEach((id) => {
            const data = gameSource[id];
            const el = document.createElement("div");
            el.className = `game-item ${id === CONFIG.defaultGame ? 'active' : ''}`;
            
            el.onclick = function() {
                document.querySelectorAll(".game-item").forEach(n => n.classList.remove("active"));
                this.classList.add("active");
                this.scrollIntoView({ behavior: "smooth", inline: "center" });
                loadStore(id);
            };

            const tagHTML = data.tag ? `<span class="badge ${data.tag.toLowerCase()}">${data.tag}</span>` : '';
            el.innerHTML = `
                ${tagHTML}
                <div class="frame"><img src="assets/${id}.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1055/1055687.png'"></div>
                <div class="label">${data.name}</div>
            `;
            document.getElementById("games_box").appendChild(el);
        });

        window.onload = () => {
            if(typeof CONFIG !== 'undefined') loadStore(CONFIG.defaultGame);
        };
    </script>
</body>
</html>
