<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa Vault | v0.036 Stable</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* 🎨 STYLE AREA: यहाँ से कलर्स और डिज़ाइन बदलें */
        :root { --bg:#050505; --cyan:#00f2ff; --silver:rgba(255,255,255,0.2); --border:rgba(255,255,255,0.08); --card:#0d0d0d; }
        body { margin:0; background:var(--bg); color:#fff; font-family:'Inter',sans-serif; overflow-x:hidden; -webkit-tap-highlight-color: transparent; }

        #header { display: grid; grid-template-columns: auto 1fr auto; align-items: center; padding: 0 16px; height: 65px; background: #050505; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(20px); }
        .left { display: flex; align-items: center; gap: 12px; }
        .menu { width: 24px; display: flex; flex-direction: column; gap: 5px; cursor: pointer; }
        .menu span { height: 2px; background: #fff; border-radius: 5px; }
        .logo { width: 40px; height: 40px; border-radius: 50%; border: 1.2px solid var(--silver); overflow: hidden; }
        .logo img { width: 100%; height: 100%; object-fit: cover; }
        .center img { height: 35px; max-width: 160px; object-fit: contain; }
        .right { width: 45px; }

        /* 🔥 SMART BADGE COLORS: लाल और ऑरेंज वाला जादू */
        .badge { position: absolute; top: -4px; right: -4px; color: #000; font-size: 8px; font-weight: 900; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; z-index: 10; box-shadow: 0 0 12px rgba(255,255,255,0.2); }
        .badge.trending { background: #ff4444; color: #fff; box-shadow: 0 0 12px rgba(255,68,68,0.5); }
        .badge.hot { background: #ff9800; color: #000; box-shadow: 0 0 12px rgba(255,152,0,0.5); }
        .badge.default { background: var(--cyan); color: #000; }

        .games { display: flex; gap: 20px; padding: 30px 20px; overflow-x: auto; scrollbar-width: none; }
        .game { min-width: 85px; text-align: center; cursor: pointer; position: relative; transition: 0.3s; }
        .frame { width: 76px; height: 76px; background: var(--card); border-radius: 24px; border: 1.5px solid #1a1a1a; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .frame img { width: 100%; height: 100%; object-fit: contain; padding: 8px; opacity: 0.9; }
        .game.active .frame { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0,242,255,0.15); transform: translateY(-10px); }
        .label { font-size: 10px; margin-top: 14px; font-weight: 800; color: #444; text-transform: uppercase; letter-spacing: 1px; }
        .game.active .label { color: #fff; }

        #sidebar { position: fixed; top: 0; left: 0; width: 280px; height: 100%; background: #080808; transform: translateX(-100%); transition: 0.4s; z-index: 2000; border-right: 1px solid var(--border); padding: 75px 20px; }
        #sidebar.active { transform: translateX(0); }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); opacity: 0; pointer-events: none; transition: 0.3s; z-index: 1500; }
        #overlay.active { opacity: 1; pointer-events: auto; }
        .menu-item { padding: 14px; border-radius: 12px; color: #555; font-weight: 700; margin-bottom: 8px; cursor: pointer; }
        .menu-item.active { background: rgba(0, 242, 255, 0.05); color: var(--cyan); border-left: 2px solid var(--cyan); }

        #store-section { padding: 15px 18px; border-top: 1px solid var(--border); min-height: 300px; }
        .store-header { color: var(--cyan); font-family: 'Orbitron', sans-serif; font-size: 11px; margin-bottom: 20px; letter-spacing: 1.5px; }
        .product-card { background: var(--card); border-radius: 20px; border: 1px solid var(--border); padding: 20px; margin-bottom: 15px; }
        .p-name { font-size: 15px; font-weight: 800; display: block; margin-bottom: 8px; color: #eee; }
        .p-price { font-size: 18px; color: #fff; font-weight: 900; }
        .buy-btn { margin-top: 15px; width: 100%; padding: 12px; background: #fff; color:#000; border:none; border-radius:12px; font-weight:900; cursor:pointer; font-size:11px; }
    </style>
</head>
<body>

    <header id="header">
        <div class="left"><div class="menu" onclick="toggleMenu()"><span></span><span></span><span></span></div><div class="logo"><img src="assets/logo.png"></div></div>
        <div class="center"><img src="assets/nexa-vault-brand.png"></div>
        <div class="right"></div>
    </header>

    <div id="sidebar">
        <div class="menu-item active">🎮 Explore Store</div>
        <div class="menu-item">🔥 Trending</div>
        <div class="menu-item">💰 Wallet</div>
        <div class="menu-item">📦 Orders</div>
    </div>
    <div id="overlay" onclick="toggleMenu()"></div>

    <div id="gameBox" class="games"></div>

    <div id="store-section">
        <div class="store-header" id="storeTitle"></div>
        <div id="productGrid"></div>
    </div>

    <script src="config.js"></script>
    <script src="products.js"></script>

    <script>
        // ⚙️ ENGINE AREA: ये साइट का दिमाग है
        function toggleMenu() {
            document.querySelector("#sidebar").classList.toggle("active");
            document.querySelector("#overlay").classList.toggle("active");
        }

        function loadProducts(gameId) {
            const gameData = GAME_NAMES[gameId];
            document.getElementById("storeTitle").innerText = `${CONFIG.siteName} • ${gameData.name}`;
            const filtered = PRODUCTS.filter(p => p.game === gameId);
            const grid = document.getElementById("productGrid");
            
            if(filtered.length === 0) {
                grid.innerHTML = `<div style="text-align:center; margin-top:40px; color:#555;">${CONFIG.emptyStockMsg}</div>`;
                return;
            }

            grid.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <span class="p-name">${p.name}</span>
                    <div class="p-price"><span>${CONFIG.currency}</span>${p.price}</div>
                    <button class="buy-btn" onclick="sendOrder('${p.name}', '${p.price}')">BUY NOW</button>
                </div>
            `).join("");
        }

        function sendOrder(name, price) {
            const phone = "91XXXXXXXXXX"; // अपना नंबर यहाँ डालें
            const msg = `नमस्ते! मैं Nexa Vault से यह खरीदना चाहता हूँ:\n\nनाम: ${name}\nकीमत: ₹${price}\n\nकृपया आगे की प्रक्रिया बतायें।`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // 🚀 LOOP AREA: गेम्स को स्क्रीन पर उतारने वाला सिस्टम
        Object.keys(GAME_NAMES).forEach((id, i) => {
            const gameData = GAME_NAMES[id];
            const el = document.createElement("div");
            el.className = `game ${id === CONFIG.defaultGame ? 'active' : ''}`;
            
            el.onclick = function() {
                document.querySelectorAll(".game").forEach(n => n.classList.remove("active"));
                this.classList.add("active");
                this.scrollIntoView({ behavior: "smooth", inline: "center" });
                loadProducts(id);
            };

            // 🧠 COLOR LOGIC: नाम के हिसाब से लाल या ऑरेंज चुनो
            let colorClass = "default";
            if (gameData.tag === "TRENDING") colorClass = "trending";
            if (gameData.tag === "HOT") colorClass = "hot";

            const tagHTML = gameData.tag ? `<span class="badge ${colorClass}">${gameData.tag}</span>` : '';

            el.innerHTML = `
                ${tagHTML}
                <div class="frame"><img src="assets/${id}.png" onerror="this.onerror=null;this.src='https://cdn-icons-png.flaticon.com/512/1055/1055687.png'"></div>
                <div class="label">${gameData.name}</div>
            `;
            document.getElementById("gameBox").appendChild(el);
        });

        window.onload = () => loadProducts(CONFIG.defaultGame);
    </script>
</body>
</html>
