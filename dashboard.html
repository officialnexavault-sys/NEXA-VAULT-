<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexa Vault</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
--cyan:#00f2ff;
--bg:#050505;
--gold:#ffd700;
}

body{
margin:0;
background:var(--bg);
color:#fff;
font-family:'Inter',sans-serif;
padding-bottom:80px;
}

/* HEADER */
#header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(12px);
position:sticky;
top:0;
z-index:1000;
}

#logo{
height:40px;
filter:drop-shadow(0 0 12px rgba(0,242,255,0.7));
}

/* MENU */
#menu-btn{
width:28px;
height:18px;
display:flex;
flex-direction:column;
justify-content:space-between;
cursor:pointer;
}

#menu-btn span{
height:3px;
background:var(--cyan);
border-radius:10px;
transition:.4s cubic-bezier(.68,-0.6,.32,1.6);
}

#menu-btn.active span:nth-child(1){
transform:translateY(7px) rotate(45deg);
}
#menu-btn.active span:nth-child(2){
opacity:0;
}
#menu-btn.active span:nth-child(3){
transform:translateY(-7px) rotate(-45deg);
}

/* SIDEBAR */
#sidebar{
position:fixed;
top:0;
right:0;
width:280px;
height:100%;
background:#0a0a0a;
transform:translateX(100%);
transition:.4s;
padding:80px 20px;
z-index:1001;
}

#sidebar.active{
transform:translateX(0);
}

.nav-link{
display:block;
color:#aaa;
padding:15px 0;
text-decoration:none;
}
.nav-link:hover{
color:var(--cyan);
}

/* OVERLAY */
#overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
opacity:0;
pointer-events:none;
transition:.3s;
}
#overlay.active{
opacity:1;
pointer-events:auto;
}

/* WALLET */
.wallet{
margin:20px;
padding:25px;
border-radius:20px;
background:linear-gradient(135deg,#0a0a0a,#050505);
border:1px solid rgba(255,215,0,0.3);
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

.label{
color:var(--gold);
font-size:12px;
}

.amount{
font-size:36px;
font-family:'Orbitron';
text-shadow:0 0 10px rgba(0,242,255,0.4);
}

/* GAME */
.game-card{
margin:20px;
padding:20px;
background:#111;
border-radius:20px;
text-align:center;
border:1px solid #222;
transition:.3s;
}

.game-card img{
width:80px;
border-radius:12px;
}

.game-card:hover{
transform:translateY(-5px);
border-color:var(--cyan);
box-shadow:0 0 15px rgba(0,242,255,0.2);
}

.status{
color:var(--cyan);
font-size:12px;
}
</style>
</head>

<body>

<header id="header">
<img src="./assets/nexa-vault-brand.png" id="logo">
<div id="menu-btn">
<span></span>
<span></span>
<span></span>
</div>
</header>

<div id="sidebar">
<a href="#" class="nav-link">Dashboard</a>
<a href="wallet.html" class="nav-link">Wallet</a>
<a href="games.html" class="nav-link">Games</a>
</div>

<div id="overlay"></div>

<div class="wallet">
<div class="label">VAULT BALANCE</div>
<div class="amount" id="balance">₹0</div>
</div>

<div class="game-card">
<img src="assets/ff.png">
<div>FREE FIRE</div>
<span class="status">ACTIVE</span>
</div>

<script>
const btn=document.getElementById("menu-btn");
const sidebar=document.getElementById("sidebar");
const overlay=document.getElementById("overlay");

function toggle(){
btn.classList.toggle("active");
sidebar.classList.toggle("active");
overlay.classList.toggle("active");
}

btn.onclick=toggle;
overlay.onclick=toggle;

document.addEventListener("keydown",e=>{
if(e.key==="Escape"){
btn.classList.remove("active");
sidebar.classList.remove("active");
overlay.classList.remove("active");
}
});

/* BALANCE */
let v=0;
let t=7900;
function run(){
if(v<t){
v+=Math.ceil(t/60);
document.getElementById("balance").innerText="₹"+v;
requestAnimationFrame(run);
}
}
run();
</script>

</body>
</html>
