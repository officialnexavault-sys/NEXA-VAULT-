<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexa Vault v26.0 | The Final Fix</title>
    <style>
        :root { --bg:#050505; --card:#0d0d0d; --cyan:#00f2ff; --radius:24px; }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        body { background:var(--bg); color:#fff; font-family:sans-serif; overflow:hidden; }

        /* 🛡️ HEADER & DYNAMIC 'X' MENU */
        #header { display:flex; align-items:center; justify-content:space-between; padding:0 20px; height:90px; border-bottom:1px solid #111; position:sticky; top:0; background:var(--bg); z-index:1000; }
        
        /* 🔒 THE 'X' BUTTON LOCK (Always Visible) */
        .menu-btn { width:28px; height:20px; display:flex; flex-direction:column; justify-content:space-between; cursor:pointer; z-index:3500; position:relative; }
        .menu-btn span { height:3px; width:100%; background:#fff; border-radius:10px; transition:.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .menu-btn.active span:nth-child(1) { transform: translateY(8.5px) rotate(45deg); background: var(--cyan); }
        .menu-btn.active span:nth-child(2) { opacity:0; transform: translateX(-20px); }
        .menu-btn.active span:nth-child(3) { transform: translateY(-8.5px) rotate(-45deg); background: var(--cyan); }

        .logo { height:45px; border-radius:50%; border:1px solid rgba(255,255,255,0.1); }
        .brand { height:55px; }

        /* 🛡️ SIDEBAR & SWIPE LOGIC */
        #sidebar { position:fixed; top:0; left:0; width:280px; height:100%; background:#080808; transform:translateX(-100%); transition:0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index:3000; border-right:1px solid #111; padding:110px 24px; box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
        #sidebar.active { transform:translateX(0); }
        #overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(5px); opacity:0; pointer-events:none; transition:0.4s; z-index:2500; }
        #overlay.active { opacity:1; pointer-events:auto; }

        /* 🛡️ BANNER & PROGRESS */
        .banner { margin:15px; height:160px; border-radius:22px; overflow:hidden; position:relative; border:1px solid #1a1a1a; }
        .banner img { width:100%; height:100%; object-fit:cover; }
        .progress { position:absolute; bottom:0; left:0; height:3px; background:var(--cyan); box-shadow:0 0 15px var(--cyan); animation:load 4s linear infinite; }
        @keyframes load { from{width:0%} to{width:100%} }

        /* 🛡️ ICON SYSTEM (HARD LOCK) */
        .games { display:flex; gap:18px; padding:20px; overflow-x:auto; scrollbar-width:none; scroll-snap-type:x mandatory; }
        .game { text-align:center; scroll-snap-align:center; min-width:85px; cursor:pointer; position:relative; }
        .frame { 
            width:74px !important; height:74px !important; border-radius:var(--radius) !important; 
            background:var(--card); border:2px solid #1a1a1a; display:flex; align-items:center; 
            justify-content:center; overflow:hidden; position:relative; transition:0.3s;
        }
        .frame img { width:100% !important; height:100% !important; object-fit:contain !important; padding:8px; }

        /* ACTIVE & GLOW */
        .game.active { transform: translateY(-8px); }
        .game.active .frame { border-color:var(--cyan); box-shadow:0 0 25px rgba(0,242,255,0.4); }

        /* 🛡️ TRADING BADGE (GLOW ANIMATION) */
        .badge { position:absolute; top:-5px; right:-5px; font-size:8px; padding:3px 8px; border-radius:6px; font-weight:900; z-index:10; color:#fff; text-transform:uppercase; animation: glow 1.5s infinite alternate; }
        .trending { background:#ff3b3b; box-shadow: 0 0 10px #ff3b3b; }
        @keyframes glow { from { opacity: 0.7; transform: scale(1); } to { opacity: 1; transform: scale(1.1); } }

        /* 🛡️ CUSTOM SVG NAV (NO EMOJIS) */
        .bottom { position:fixed; bottom:0; width:100%; height:75px; background:#000; display:flex; justify-content:space-around; align-items:center; border-top:1px solid #111; z-index:1000; padding-bottom:15px; }
        .nav { display:flex; flex-direction:column; align-items:center; gap:5px; color:#444; transition: 0.3s; }
        .nav svg { width:22px; height:22px; fill: currentColor; }
        .nav.active { color:var(--cyan); }
    </style>
</head>
<body>

<div id="overlay"></div>
<div id="sidebar">
    <div style="color:var(--cyan); font-weight:900; font-family: sans-serif; letter-spacing: 2px;">NEXA VAULT</div>
    <div style="margin-top: 40px; color: #555; font-size: 14px; font-weight: 700;">DASHBOARD v26.0</div>
</div>

<header id="header">
    <div class="menu-btn" id="menuBtn"><span></span><span></span><span></span></div>
    <img src="assets/logo.png" class="logo">
    <img src="assets/nexa-vault-brand.png" class="brand">
    <div style="width:25px;"></div>
</header>

<main id="home">
    <div class="banner">
        <img id="bannerImg" src="assets/banner1.jpg" onerror="this.src='https://via.placeholder.com/400x150/0d0d0d/00f2ff?text=NEXA+VAULT'">
        <div class="progress"></div>
    </div>
    <div class="games" id="game_box"></div>
    <div id="store" style="padding:0 20px 120px 20px;"></div>
</main>

<div class="bottom">
    <div class="nav active" id="nav-home">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <span style="font-size:10px; font-weight:800;">HOME</span>
    </div>
    <div class="nav">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <span style="font-size:10px; font-weight:800;">SEARCH</span>
    </div>
    <div class="nav">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        <span style="font-size:10px; font-weight:800;">PROFILE</span>
    </div>
</div>

<script src="config.js"></script>
<script src="products.js"></script>
<script>
const NexaEngine = {
    init() {
        this.render();
        this.sidebarLogic();
        this.bannerLogic();
        setTimeout(() => document.querySelector('.game').click(), 300);
    },
    sidebarLogic() {
        const btn = document.getElementById('menuBtn');
        const side = document.getElementById('sidebar');
        const over = document.getElementById('overlay');
        let startX = 0;

        const toggle = () => { btn.classList.toggle('active'); side.classList.toggle('active'); over.classList.toggle('active'); };
        btn.onclick = toggle; over.onclick = toggle;

        // 🖐️ SLIDE TO CLOSE (Right to Left)
        side.addEventListener('touchstart', e => { startX = e.touches[0].clientX; });
        side.addEventListener('touchmove', e => {
            let moveX = e.touches[0].clientX;
            let diff = moveX - startX;
            if (diff < 0) { side.style.transform = `translateX(${diff}px)`; }
        });
        side.addEventListener('touchend', e => {
            let endX = e.changedTouches[0].clientX;
            side.style.transform = "";
            if (startX - endX > 100) toggle(); // 100px swipe = Close
        });
    },
    render() {
        const box = document.getElementById("game_box");
        if(typeof GAME_NAMES === 'undefined') return;
        box.innerHTML = Object.keys(GAME_NAMES).map(id => {
            const g = GAME_NAMES[id];
            return `
            <div class="game" onclick="selectGame('${id}',this)">
                <div class="frame">
                    ${g.tag?`<span class="badge ${g.tag.toLowerCase()}">${g.tag}</span>`:""}
                    <img src="assets/${id}.png" onerror="this.src='assets/logo.png'">
                </div>
                <div style="font-size:10px; margin-top:10px; color:#555; font-weight:800;">${g.name}</div>
            </div>`;
        }).join("");
    },
    bannerLogic() {
        const banners = ["assets/banner1.jpg","assets/banner2.jpg"];
        let i = 0;
        setInterval(() => {
            i = (i+1)%banners.length;
            document.getElementById("bannerImg").src = banners[i];
        }, 4000);
    }
};

function selectGame(id, el) {
    document.querySelectorAll(".game").forEach(g => g.classList.remove("active"));
    el.classList.add("active");
    el.scrollIntoView({ behavior: "smooth", inline: "center" });

    const data = PRODUCTS.filter(p => p.game === id);
    document.getElementById("store").innerHTML = data.map(p => `
        <div style="background:var(--card); padding:22px; border-radius:22px; border:1px solid #1a1a1a; margin-bottom:15px;">
            <div style="font-weight:800; font-size:15px;">${p.name}</div>
            <div style="color:var(--cyan); font-weight:900; font-size:18px; margin-top:8px;">₹${p.price}</div>
            <button style="width:100%; padding:15px; border-radius:14px; border:none; background:#fff; color:#000; font-weight:900; margin-top:15px;">ORDER NOW</button>
        </div>
    `).join("");
}

document.addEventListener("DOMContentLoaded", () => NexaEngine.init());
</script>
</body>
</html>
