<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa Vault | Elite Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --cyan: #00f2ff; --bg: #050505; --card: #151515; --red-hot: linear-gradient(45deg, #ff0000, #ff5f6d); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        /* 1. PREMIUM HEADER (Glow & Depth) */
        #nexa-header {
            position: sticky; top: 0; z-index: 1000;
            display: flex; align-items: center; padding: 12px 20px;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 5px 25px rgba(0,0,0,0.7); gap: 15px;
        }
        .menu-btn { cursor: pointer; display: flex; flex-direction: column; gap: 5px; }
        .menu-btn span { width: 22px; height: 2px; background: #fff; border-radius: 2px; }
        .nexa-logo-group { display: flex; align-items: center; gap: 12px; flex: 1; }
        .brand-logo { height: 42px; width: 42px; border-radius: 50%; border: 1.5px solid var(--cyan); box-shadow: 0 0 12px rgba(0,242,255,0.4); }
        .brand-text { height: 24px; object-fit: contain; filter: drop-shadow(0 0 8px rgba(0,242,255,0.6)); }

        /* 2. CATEGORY SYSTEM (App-Level Interaction) */
        .category-section { padding: 10px 0; }
        .category-wrapper { 
            display: flex; gap: 18px; padding: 15px 20px 25px 20px; /* Extra padding for badges & indicators */
            overflow-x: auto; scroll-behavior: smooth; 
            scrollbar-width: none; scroll-snap-type: x mandatory;
        }
        .category-wrapper::-webkit-scrollbar { display: none; }

        .cat-node {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            min-width: 65px; cursor: pointer; position: relative; transition: 0.3s;
            scroll-snap-align: center; padding-top: 8px; /* Safe space for Badge */
        }

        /* 🔴 TRENDING & HOT BADGES */
        .badge-hot {
            position: absolute; top: 0px; right: -5px;
            background: var(--red-hot); color: white; font-size: 7px;
            font-weight: 900; padding: 2px 6px; border-radius: 5px;
            text-transform: uppercase; z-index: 10;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.6);
            animation: pulseBadge 1.5s infinite;
        }
        @keyframes pulseBadge { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .node-icon-wrap {
            width: 62px; height: 62px; background: var(--card);
            border-radius: 18px; border: 1.5px solid #222;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; transition: 0.3s;
        }
        .node-icon-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .node-label { font-size: 10px; font-weight: 600; color: #777; white-space: nowrap; transition: 0.3s; }

        /* Active & Touch Feedback */
        .cat-node.active .node-icon-wrap { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); background: rgba(0, 242, 255, 0.1); transform: translateY(-3px); }
        .cat-node.active .node-label { color: #fff; }
        .active-indicator { position: absolute; bottom: -12px; width: 0; height: 3px; background: var(--cyan); border-radius: 10px; transition: 0.4s; box-shadow: 0 0 10px var(--cyan); }
        .cat-node.active .active-indicator { width: 32px; }

        /* Premium Tap Feel */
        .node-icon-wrap:active { transform: scale(0.9) !important; opacity: 0.8; }

        /* 3. MAIN SLOTS */
        .main-content { padding: 0 20px; }
        .banner-slot { width: 100%; height: 170px; background: #111; border-radius: 25px; border: 1px dashed #333; margin-top: 10px; display: flex; align-items: center; justify-content: center; color: #444; font-weight: bold; letter-spacing: 1.5px; }

        /* Sidebar System */
        #sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #0a0a0a; z-index: 1001; transition: 0.4s; border-right: 1px solid #222; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); opacity: 0; pointer-events: none; z-index: 999; transition: 0.3s; }
        #sidebar.active { left: 0; }
        #overlay.active { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>

    <header id="nexa-header">
        <div class="menu-btn" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
        <div class="nexa-logo-group">
            <img src="assets/logo.png" alt="Logo" class="brand-logo">
            <img src="assets/nexa-vault-brand.png" alt="Nexa Vault" class="brand-text">
        </div>
    </header>

    <div id="sidebar"></div>
    <div id="overlay" onclick="toggleMenu()"></div>

    <div class="category-section">
        <div class="category-wrapper" id="catScroll">
            <div class="cat-node active" onclick="activateCat(this)">
                <div class="badge-hot">TRENDING</div>
                <div class="node-icon-wrap"><img src="assets/ff.png" alt="FF" onerror="this.style.display='none';this.parentNode.innerHTML='🔥'"></div>
                <span class="node-label">Free Fire</span><div class="active-indicator"></div>
            </div>
            <div class="cat-node" onclick="activateCat(this)">
                <div class="badge-hot" style="background: linear-gradient(45deg, #ff8c00, #ffbd33);">HOT</div>
                <div class="node-icon-wrap"><img src="assets/bgmi.png" alt="BGMI" onerror="this.style.display='none';this.parentNode.innerHTML='🔫'"></div>
                <span class="node-label">BGMI</span><div class="active-indicator"></div>
            </div>
            <div class="cat-node" onclick="activateCat(this)">
                <div class="node-icon-wrap">⭐</div><span class="node-label">For You</span><div class="active-indicator"></div>
            </div>
            <div class="cat-node" onclick="activateCat(this)">
                <div class="node-icon-wrap"><img src="assets/mc.png" alt="MC" onerror="this.style.display='none';this.parentNode.innerHTML='🧱'"></div>
                <span class="node-label">Minecraft</span><div class="active-indicator"></div>
            </div>
            <div class="cat-node" onclick="activateCat(this)">
                <div class="node-icon-wrap"><img src="assets/gta5.png" alt="GTA" onerror="this.style.display='none';this.parentNode.innerHTML='🚗'"></div>
                <span class="node-label">GTA 5</span><div class="active-indicator"></div>
            </div>
            <div class="cat-node" onclick="activateCat(this)">
                <div class="node-icon-wrap"><img src="assets/asphalt.png" alt="A" onerror="this.style.display='none';this.parentNode.innerHTML='🏎️'"></div>
                <span class="node-label">Asphalt</span><div class="active-indicator"></div>
            </div>
            <div class="cat-node" onclick="activateCat(this)">
                <div class="node-icon-wrap"><img src="assets/roblox.png" alt="R" onerror="this.style.display='none';this.parentNode.innerHTML='🎮'"></div>
                <span class="node-label">Roblox</span><div class="active-indicator"></div>
            </div>
            <div class="cat-node" onclick="activateCat(this)">
                <div class="node-icon-wrap"><img src="assets/cod.png" alt="COD" onerror="this.style.display='none';this.parentNode.innerHTML='🔫'"></div>
                <span class="node-label">COD Mobile</span><div class="active-indicator"></div>
            </div>
            <div class="cat-node" onclick="activateCat(this)">
                <div class="node-icon-wrap"><img src="assets/ludo.png" alt="L" onerror="this.style.display='none';this.parentNode.innerHTML='🎲'"></div>
                <span class="node-label">Ludo King</span><div class="active-indicator"></div>
            </div>
            <div class="cat-node" onclick="activateCat(this)">
                <div class="node-icon-wrap"><img src="assets/coc.png" alt="C" onerror="this.style.display='none';this.parentNode.innerHTML='🏰'"></div>
                <span class="node-label">Clash Clans</span><div class="active-indicator"></div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="banner-slot">CINEMATIC BANNER (NEXT)</div>
    </div>

    <script>
        function activateCat(el) {
            document.querySelectorAll('.cat-node').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            el.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
        }
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
