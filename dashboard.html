<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa Vault Cosmic</title>

<style>
:root{
--bg:#050505;
--card:#0d0d0d;
--cyan:#00f2ff;
--radius:22px;
}

/* BASE */
body{
margin:0;
background:var(--bg);
color:#fff;
font-family:sans-serif;
overflow-x:hidden;
}

/* HEADER */
#header{
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
height:85px;
border-bottom:1px solid #111;
}

/* MENU */
.menu{
width:25px;
height:16px;
display:flex;
flex-direction:column;
justify-content:space-between;
cursor:pointer;
}
.menu span{
height:2px;
background:#fff;
border-radius:10px;
transition:.3s;
}

/* LOGO */
.logo{
height:45px;
border-radius:50%;
}

/* BRAND */
.brand{
height:50px;
}

/* SEARCH */
.search{
margin:15px;
background:#111;
border-radius:14px;
padding:12px;
display:flex;
align-items:center;
border:1px solid #1a1a1a;
}

.search input{
background:none;
border:none;
color:#fff;
outline:none;
flex:1;
}

/* ICON SEARCH */
.icon-search{
width:18px;
height:18px;
border:2px solid #888;
border-radius:50%;
position:relative;
}
.icon-search::after{
content:"";
position:absolute;
width:7px;
height:2px;
background:#888;
bottom:-4px;
right:-4px;
transform:rotate(45deg);
}

/* BANNER */
.banner{
margin:10px;
height:150px;
border-radius:18px;
overflow:hidden;
position:relative;
}
.banner img{
width:100%;
height:100%;
object-fit:cover;
}

/* PROGRESS */
.progress{
position:absolute;
bottom:0;
left:0;
height:3px;
background:var(--cyan);
animation:load 4s linear infinite;
}
@keyframes load{
from{width:0}
to{width:100%}
}

/* GAMES */
.games{
display:flex;
gap:15px;
padding:15px;
overflow-x:auto;
scroll-snap-type:x mandatory;
}

.game{
scroll-snap-align:center;
text-align:center;
cursor:pointer;
}

/* FRAME LOCK */
.frame{
width:72px;
height:72px;
border-radius:var(--radius);
background:var(--card);
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
transition:.3s;
position:relative;
}
.frame img{
width:100%;
height:100%;
object-fit:cover;
}

/* ACTIVE */
.game.active .frame{
box-shadow:0 0 15px var(--cyan);
transform:translateY(-5px);
}

/* RIPPLE */
.frame::after{
content:"";
position:absolute;
width:0;
height:0;
background:rgba(0,242,255,0.3);
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}
.frame.ripple::after{
animation:ripple .5s;
}
@keyframes ripple{
to{width:120px;height:120px;opacity:0;}
}

/* BADGE */
.badge{
position:absolute;
top:-5px;
right:-5px;
font-size:8px;
padding:3px 6px;
border-radius:5px;
font-weight:900;
}
.trending{background:#ff3b3b;}
.hot{background:#ff9800;color:#000;}
.new{background:#2196f3;}
.popular{background:#9c27b0;}
.classic{background:gold;color:#000;}

/* BOTTOM NAV */
.bottom{
position:fixed;
bottom:0;
width:100%;
height:65px;
background:#000;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #111;
}

.nav{
text-align:center;
color:#555;
font-size:10px;
}
.nav.active{
color:var(--cyan);
}
</style>
</head>

<body>

<!-- HEADER -->
<div id="header">
<div class="menu"><span></span><span></span><span></span></div>
<img src="assets/logo.png" class="logo">
<img src="assets/nexa-vault-brand.png" class="brand">
</div>

<!-- SEARCH -->
<div class="search">
<div class="icon-search"></div>
<input placeholder="Search games...">
</div>

<!-- BANNER -->
<div class="banner">
<img id="bannerImg" src="assets/banner1.jpg" onerror="this.src='https://via.placeholder.com/400x150'">
<div class="progress"></div>
</div>

<!-- GAMES -->
<div class="games" id="games"></div>

<!-- NAV -->
<div class="bottom">
<div class="nav active">Home</div>
<div class="nav">Search</div>
<div class="nav">Profile</div>
</div>

<script>

const games=[
{name:"Free Fire",img:"assets/ff.png",tag:"trending"},
{name:"BGMI",img:"assets/bgmi.png",tag:"hot"},
{name:"COD",img:"assets/cod.png",tag:"new"},
{name:"Clash",img:"assets/clash.png",tag:"popular"},
{name:"Mini",img:"assets/mini.png",tag:"classic"},
];

const box=document.getElementById("games");

box.innerHTML=games.map((g,i)=>`
<div class="game" onclick="selectGame(${i},this)">
<div class="frame">
${g.tag?`<span class="badge ${g.tag}">${g.tag}</span>`:""}
<img src="${g.img}" onerror="this.src='assets/logo.png'">
</div>
<div>${g.name}</div>
</div>
`).join("");

function selectGame(i,el){
document.querySelectorAll(".game").forEach(g=>g.classList.remove("active"));
el.classList.add("active");
}

/* RIPPLE */
document.addEventListener("click",e=>{
let f=e.target.closest(".frame");
if(!f)return;
f.classList.remove("ripple");
void f.offsetWidth;
f.classList.add("ripple");
});

/* BANNER */
const banners=["assets/banner1.jpg","assets/banner2.jpg"];
let i=0;
setInterval(()=>{
i=(i+1)%banners.length;
document.getElementById("bannerImg").src=banners[i];
},4000);

</script>

</body>
</html>
