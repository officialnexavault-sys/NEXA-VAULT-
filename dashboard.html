<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa Vault | Dynamic System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --cyan: #00f2ff; --bg: #050505; --card: #121212; --gold: #ffd700; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        /* 1. HEADER (Perfect Center & Safe) */
        #nexa-header {
            position: sticky; top: 0; z-index: 1000;
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            padding: 12px 18px; background: rgba(0, 0, 0, 0.98); backdrop-filter: blur(20px);
            border-bottom: 1.5px solid rgba(0, 242, 255, 0.15); box-shadow: 0 5px 30px #000;
        }
        .header-center { display: flex; justify-content: center; }
        .brand-text-ui { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 800; color: #fff; text-shadow: 0 0 10px var(--cyan); letter-spacing: 2px; }
        
        .menu-btn { cursor: pointer; display: flex; flex-direction: column; gap: 5.5px; width: 26px; z-index: 1002; transition: 0.3s; }
        .menu-btn span { width: 100%; height: 2px; background: #fff; border-radius: 10px; transition: 0.3s; }
        .menu-btn.open span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
        .menu-btn.open span:nth-child(2) { opacity: 0; }
        .menu-btn.open span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

        .header-logo { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--cyan); cursor: pointer; box-shadow: 0 0 10px rgba(0,242,255,0.2); }

        /* 2. SIDEBAR WITH PROFILE */
        #sidebar { 
            position: fixed; top: 0; left: 0; width: 285px; height: 100%; 
            background: #0a0a0a; z-index: 1001; transform: translateX(-100%); 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-right: 1px solid #222;
        }
        #sidebar.active { transform: translateX(0); }
        .side-profile { padding: 60px 20px 25px 20px; border-bottom: 1px solid #222; background: linear-gradient(180deg, rgba(0,242,255,0.05), transparent); }
        .profile-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--cyan); margin-bottom: 12px; }
        .user-name { display: block; font-weight: 800; font-size: 16px; color: #fff; }
        .user-meta { display: block; font-size: 10px; color: var(--cyan); margin-top: 4px; letter-spacing: 1px; }

        /* 3. DYNAMIC CATEGORY SCROLL */
        .category-wrapper { display: flex; gap: 18px; padding: 20px; overflow-x: auto; scrollbar-width: none; scroll-snap-type: x mandatory; }
        .category-wrapper::-webkit-scrollbar { display: none; }
        .cat-node { display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: 65px; cursor: pointer; scroll-snap-align: center; transition: 0.3s; }
        .node-icon-wrap { width: 62px; height: 62px; background: var(--card); border-radius: 18px; border: 1.5px solid #222; display: flex; align-items: center; justify-content: center; overflow: hidden; transition: 0.3s; }
        .node-icon-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .cat-node.active .node-icon-wrap { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0,242,255,0.4); transform: translateY(-3.5px); }
        .node-label { font-size: 9px; color: #777; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .cat-node.active .node-label { color: #fff; }

        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); opacity: 0; pointer-events: none; z-index: 999; transition: 0.3s; }
        #overlay.active { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>

    <header id="nexa-header">
        <div style="display:flex; justify-content:flex-start;">
            <div class="menu-btn" id="menuBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </div>
        </div>
        <div class="header-center"><span class="brand-text-ui">NEXA VAULT</span></div>
        <div style="display:flex; justify-content:flex-end;">
            <img src="assets/logo.png" alt="Logo" class="header-logo" onclick="location.reload()" onerror="this.src='https://cdn-icons-png.flaticon.com/512/811/811440.png'">
        </div>
    </header>

    <div id="sidebar">
        <div class="side-profile" onclick="location.reload()">
            <img src="assets/logo.png" alt="P" class="profile-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'">
            <span class="user-name">VALMIKI KUMAR</span>
            <span class="user-meta">ID: NEXA-786 | BALANCE: ₹0.00</span>
        </div>
    </div>
    <div id="overlay" onclick="toggleMenu()"></div>

    <div class="category-section">
        <div class="category-wrapper" id="gameContainer">
            </div>
    </div>

    <script>
        // 🚀 THE GAME ASSETS ENGINE (तुम्हारे फोल्डर की इमेजेस के हिसाब से)
        const games = [
            { id: 'ff', name: 'Free Fire' },
            { id: 'bgmi', name: 'BGMI' },
            { id: 'cod', name: 'COD Mobile' },
            { id: 'coc', name: 'Clash Clans' },
            { id: 'mc', name: 'Minecraft' },
            { id: 'gta5', name: 'GTA 5' },
            { id: 'asphalt', name: 'Asphalt 9' },
            { id: 'roblox', name: 'Roblox' },
            { id: 'ludo', name: 'Ludo King' },
            { id: 'pool', name: '8 Ball Pool' },
            { id: 'stumble', name: 'Stumble Guys' },
            { id: 'val', name: 'Valorant' },
            { id: 'cs2', name: 'CS 2' },
            { id: 'mlbb', name: 'MLBB' },
            { id: 'genshin', name: 'Genshin' },
            { id: 'royale', name: 'Clash Royale' },
            { id: 'hok', name: 'HOK' },
            { id: 'farlight', name: 'Farlight 84' },
            { id: 'blood', name: 'Blood Strike' },
            { id: 'mc_pc', name: 'Minecraft PC' }
        ];

        const container = document.getElementById('gameContainer');

        // 🛠️ AUTOMATIC GAME LOADER
        games.forEach((game, index) => {
            const node = document.createElement('div');
            node.className = `cat-node ${index === 0 ? 'active' : ''}`;
            node.onclick = function() { activateCat(this); };
            
            node.innerHTML = `
                <div class="node-icon-wrap">
                    <img src="assets/${game.id}.png" alt="${game.name}" 
                         onerror="this.src='https://cdn-icons-png.flaticon.com/512/811/811440.png'; this.style.opacity='0.5'">
                </div>
                <span class="node-label">${game.name}</span>
            `;
            container.appendChild(node);
        });

        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const btn = document.getElementById('menuBtn');
            const over = document.getElementById('overlay');
            const isOpen = sidebar.classList.toggle('active');
            btn.classList.toggle('open', isOpen);
            over.classList.toggle('active', isOpen);
        }

        function activateCat(el) {
            document.querySelectorAll('.cat-node').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            el.scrollIntoView({ behavior: "smooth", inline: "center" });
        }

        document.addEventListener('keydown', (e) => { if(e.key === 'Escape') { const s = document.getElementById('sidebar'); if(s.classList.contains('active')) toggleMenu(); } });
    </script>
</body>
</html>
