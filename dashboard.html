<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa Vault | Elite Business Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#050505; --cyan:#00f2ff; --silver:rgba(255,255,255,0.1); --border:rgba(255,255,255,0.08); --card:#0d0d0d; }
        body { margin:0; background:var(--bg); color:#fff; font-family:'Inter',sans-serif; overflow-x:hidden; -webkit-tap-highlight-color: transparent; }

        /* 🏆 THE ELITE HEADER */
        #header {
            display: grid; grid-template-columns: auto 1fr auto; align-items: center;
            padding: 0 16px; height: 65px; background: #050505; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(20px);
        }
        .left { display: flex; align-items: center; gap: 12px; }
        .menu { width: 24px; display: flex; flex-direction: column; gap: 5px; cursor: pointer; }
        .menu span { height: 2px; background: #fff; border-radius: 5px; }
        .logo { width: 40px; height: 40px; border-radius: 50%; border: 1.2px solid var(--silver); overflow: hidden; }
        .logo img { width: 100%; height: 100%; object-fit: cover; }
        .center { display: flex; justify-content: center; align-items: center; }
        .center img { height: 34px; max-width: 160px; object-fit: contain; }
        .right { width: 40px; }

        /* 📂 SIDEBAR (Usable Navigation) */
        #sidebar { position: fixed; top: 0; left: 0; width: 280px; height: 100%; background: #080808; transform: translateX(-100%); transition: 0.4s; z-index: 2000; border-right: 1px solid var(--border); padding: 75px 20px; }
        #sidebar.active { transform: translateX(0); }
        .menu-item { padding: 14px; border-radius: 12px; color: #666; font-weight: 700; font-size: 14px; margin-bottom: 8px; cursor: pointer; transition: 0.3s; }
        .menu-item.active { background: rgba(0, 242, 255, 0.05); color: var(--cyan); border-left: 2px solid var(--cyan); border-radius: 0 12px 12px 0; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); opacity: 0; pointer-events: none; transition: 0.3s; z-index: 1500; }
        #overlay.active { opacity: 1; pointer-events: auto; }

        /* 🎮 GAME GRID */
        .games { display: flex; gap: 18px; padding: 25px 18px; overflow-x: auto; scrollbar-width: none; }
        .games::-webkit-scrollbar { display: none; }
        .game { min-width: 85px; text-align: center; cursor: pointer; transition: 0.3s; }
        .frame { width: 78px; height: 78px; background: var(--card); border-radius: 22px; border: 1.5px solid #1a1a1a; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 8px; }
        .frame img { width: 100%; height: 100%; object-fit: contain; }
        .game.active .frame { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0,242,255,0.15); transform: translateY(-8px); }
        .label { font-size: 10px; margin-top: 12px; font-weight: 800; color: #444; text-transform: uppercase; letter-spacing: 1px; }
        .game.active .label { color: #fff; }

        /* 💰 STORE AREA */
        #store-section { padding: 15px 18px; border-top: 1px solid var(--border); min-height: 300px; }
        .store-header { color: var(--cyan); font-family: 'Orbitron', sans-serif; font-size: 12px; margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase; }
        .product-card { background: var(--card); border-radius: 20px; border: 1px solid var(--border); padding: 20px; margin-bottom: 15px; }
        .p-name { font-size: 15px; font-weight: 800; display: block; margin-bottom: 6px; color: #eee; }
        .p-price { font-size: 18px; color: #fff; font-weight: 900; }
        .p-price span { color: var(--cyan); font-size: 11px; margin-right: 3px; }
        .buy-btn { margin-top: 15px; width: 100%; padding: 12px; background: #fff; color:#000; border:none; border-radius:12px; font-weight:900; font-size:11px; cursor:pointer; }
    </style>
</head>
<body>

    <header id="header">
        <div class="left"><div class="menu" onclick="toggleMenu()"><span></span><span></span><span></span></div><div class="logo"><img src="assets/logo.png"></div></div>
        <div class="center"><img src="assets/nexa-vault-brand.png"></div>
        <div class="right"></div>
    </header>

    <div id="sidebar">
        <div class="menu-item active">🎮 Explore Store</div>
        <div class="menu-item">🔥 Trending</div>
        <div class="menu-item">💰 My Wallet</div>
        <div class="menu-item">📦 My Orders</div>
        <div class="menu-item">⚙️ Settings</div>
    </div>
    <div id="overlay" onclick="toggleMenu()"></div>

    <div id="gameBox" class="games"></div>

    <div id="store-section">
        <div class="store-header" id="storeTitle">SELECT A GAME</div>
        <div id="productGrid"></div>
    </div>

    <script>
        function toggleMenu() {
            document.querySelector("#sidebar").classList.toggle("active");
            document.querySelector("#overlay").classList.toggle("active");
        }

        // 🧠 SCALABLE PRODUCT ENGINE
        const products = [
            { game: "ff", name: "Elite Pass ID - Lvl 72", price: "1,499" },
            { game: "ff", name: "Old Sakura Bundle ID", price: "4,999" },
            { game: "bgmi", name: "Glacier M416 + Mummy Set", price: "8,999" },
            { game: "mc", name: "Minecraft Java Edition", price: "1,999" }
        ];

        const gameNames = { ff:"Free Fire", bgmi:"BGMI", cod:"COD Mobile", coc:"Clash Clans", mc:"Minecraft", gta5:"GTA 5", asphalt:"Asphalt 9", roblox:"Roblox", ludo:"Ludo King", pool:"8 Ball Pool", stumble:"Stumble", val:"Valorant", cs2:"CS2", mlbb:"MLBB", genshin:"Genshin", royale:"Royale", hok:"HOK", farlight:"Farlight", blood:"Blood Strike", mc_pc:"MC PC" };

        const box = document.getElementById("gameBox");
        const grid = document.getElementById("productGrid");
        const title = document.getElementById("storeTitle");

        function loadProducts(gameId) {
            title.innerText = `${gameNames[gameId].toUpperCase()} STORE`;
            // Filter products based on selected game
            const filtered = products.filter(p => p.game === gameId);
            
            if(filtered.length === 0) {
                grid.innerHTML = `<p style="color:#333; font-size:12px; margin-top:20px;"> स्टॉक अभी खाली है, भाई 😏</p>`;
                return;
            }

            grid.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <span class="p-name">${p.name}</span>
                    <div class="p-price"><span>₹</span>${p.price}</div>
                    <button class="buy-btn" onclick="startBuy('${p.name}', '${p.price}')">BUY NOW</button>
                </div>
            `).join("");
        }

        function startBuy(name, price) {
            alert(`Proceeding to Secure Checkout...\n\nProduct: ${name}\nAmount: ₹${price}`);
        }

        // INIT GAMES
        Object.keys(gameNames).forEach((id, i) => {
            const el = document.createElement("div");
            el.className = `game ${id === 'ff' ? 'active' : ''}`;
            el.onclick = function() {
                document.querySelectorAll(".game").forEach(n => n.classList.remove("active"));
                this.classList.add("active");
                this.scrollIntoView({ behavior: "smooth", inline: "center" });
                loadProducts(id);
            };
            el.innerHTML = `<div class="frame"><img src="assets/${id}.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1055/1055687.png'"></div><div class="label">${gameNames[id]}</div>`;
            box.appendChild(el);
        });

        window.onload = () => loadProducts("ff");
    </script>
</body>
</html>
