<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa Vault Dashboard</title>
</head>
<body>
    <div id="ui-import-root"></div>

    <main id="playground">
        <div id="game_box" style="display:flex; gap:20px; padding:20px; overflow-x:auto;">
            </div>
        <div id="store_grid" style="padding:20px;">
            </div>
    </main>

    <script src="core-ui.js"></script>
    <script src="config.js"></script>
    <script src="products.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            NexaSystem.inject(); // 💉 UI डालो
            NexaSystem.init();   // 🧠 बटन चालू करो
            
            // 🚀 गेम्स लोड करने का असली कोड (LOCKED STRUCTURE)
            const box = document.getElementById("game_box");
            box.innerHTML = Object.keys(GAME_NAMES).map(id => `
                <div class="game-item" onclick="loadStore('${id}')" style="text-align:center; min-width:80px;">
                    <div class="frame"><img src="assets/${id}.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1055/1055687.png'"></div>
                    <div style="font-size:10px; color:#555; margin-top:10px;">${GAME_NAMES[id].name}</div>
                </div>
            `).join("");
        });

        function loadStore(id) {
            const grid = document.getElementById("store_grid");
            const items = PRODUCTS.filter(p => p.game === id);
            grid.innerHTML = items.map(p => `
                <div style="background:#0d0d0d; padding:20px; border-radius:15px; margin-bottom:15px; border:1px solid #1a1a1a;">
                    <div style="font-weight:800;">${p.name}</div>
                    <div style="color:var(--cyan); font-weight:900;">₹${p.price}</div>
                    <button onclick="window.open('https://wa.me/91XXXXXXXXXX')" style="width:100%; padding:10px; margin-top:10px; border-radius:10px; border:none; font-weight:900;">Order Now</button>
                </div>
            `).join("");
        }
    </script>
</body>
</html>
