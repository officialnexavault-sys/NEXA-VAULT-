<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa Vault v2</title>

<style>
:root {
  --bg:#050505;
  --card:#0d0d0d;
  --cyan:#00f2ff;
}

body{
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:sans-serif;
  overflow-x:hidden; /* FIX */
}

/* HEADER */
#header{
  height:80px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-bottom:1px solid #111;
}

.logo{
  height:50px;
}

/* SEARCH */
.search-bar{
  margin:15px;
  background:#111;
  border-radius:14px;
  padding:12px;
  display:flex;
  align-items:center;
}

.search-bar input{
  background:none;
  border:none;
  color:#fff;
  outline:none;
  flex:1;
}

/* BANNER */
.banner{
  height:150px;
  margin:10px;
  border-radius:18px;
  overflow:hidden;
  position:relative;
}

.banner img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* PROGRESS BAR */
.progress{
  position:absolute;
  bottom:0;
  left:0;
  height:3px;
  background:var(--cyan);
  width:0%;
  animation:load 4s linear infinite;
}

@keyframes load{
  from{width:0%}
  to{width:100%}
}

/* GAMES */
.games{
  display:flex;
  gap:15px;
  padding:15px;
  overflow-x:auto;
}

.game{
  text-align:center;
}

.frame{
  width:70px;
  height:70px;
  border-radius:20px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  transition:.2s;
}

.frame img{
  width:100%;
  height:100%;
  object-fit:cover; /* FIX */
}

/* ACTIVE */
.game.active .frame{
  box-shadow:0 0 15px var(--cyan);
  transform:translateY(-5px);
}

.game:active .frame{
  transform:scale(.9);
}

/* BOTTOM NAV (SVG READY) */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  height:65px;
  background:#000;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid #111;
}

.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:10px;
  color:#444;
}

.nav-item.active{
  color:var(--cyan);
}

/* PAGES */
.page{ display:none; }
.page.active{ display:block; }
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">

<header id="header">
<img src="assets/nexa-vault-brand.png" class="logo">
</header>

<div class="search-bar" onclick="openSearch()">
🔍 <input placeholder="Search..." disabled>
</div>

<div class="banner">
<img id="bannerImg" src="assets/banner1.jpg">
<div class="progress"></div>
</div>

<div class="games" id="gamesBox"></div>

<div id="store"></div>

</div>

<!-- SEARCH -->
<div id="searchPage" class="page">
<div class="search-bar">
<input placeholder="Search..." oninput="searchGame(this.value)">
</div>
<div id="results"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="page">
<h2 style="padding:20px">Profile 👤</h2>
</div>

<!-- NAV -->
<div class="bottom-nav">

<div class="nav-item active" onclick="switchPage('home',this)">
🏠<span>Home</span>
</div>

<div class="nav-item" onclick="switchPage('searchPage',this)">
🔍<span>Search</span>
</div>

<div class="nav-item" onclick="switchPage('profile',this)">
👤<span>Profile</span>
</div>

</div>

<script>

/* PAGE SWITCH */
function switchPage(id,el){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');

document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
el.classList.add('active');
}

/* SEARCH OPEN */
function openSearch(){
switchPage('searchPage',document.querySelectorAll('.nav-item')[1]);
}

/* DATA */
const games = [
{name:"Free Fire",img:"assets/ff.png"},
{name:"BGMI",img:"assets/bgmi.png"},
{name:"COD",img:"assets/cod.png"}
];

/* RENDER */
const box = document.getElementById("gamesBox");
box.innerHTML = games.map((g,i)=>`
<div class="game" onclick="selectGame(${i},this)">
<div class="frame">
<img src="${g.img}">
</div>
<div>${g.name}</div>
</div>
`).join("");

/* SELECT GAME */
function selectGame(i,el){
document.querySelectorAll('.game').forEach(g=>g.classList.remove('active'));
el.classList.add('active');

document.getElementById("store").innerHTML = `
<div style="padding:20px">
<b>${games[i].name}</b><br>
₹100
</div>`;
}

/* SEARCH */
function searchGame(val){
const res = document.getElementById("results");
const f = games.filter(g=>g.name.toLowerCase().includes(val.toLowerCase()));
res.innerHTML = f.map(g=>`<div style="padding:10px">${g.name}</div>`).join("");
}

/* BANNER */
const banners=["assets/banner1.jpg","assets/banner2.jpg"];
let i=0;
setInterval(()=>{
i=(i+1)%banners.length;
document.getElementById("bannerImg").src=banners[i];
},4000);

</script>

</body>
</html>
