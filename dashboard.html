<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexa Vault v33 | Production Certified</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #0d0d0d; --cyan: #00f2ff; --border: rgba(255, 255, 255, 0.08); --header-h: 80px; --nav-h: 75px; --font-brand: 'Orbitron', sans-serif; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* 🛡️ FIX #7: SMOOTH GRADIENT BACKGROUND */
        body { 
            background: linear-gradient(to bottom, #050505, #0a0a0a, #101010);
            color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; 
            min-height: 100vh;
        }

        /* 🛡️ FIX #3: HEADER LAYOUT (Strict Alignment) */
        header { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15px; height: var(--header-h); background: rgba(5,5,5,0.9);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 2000;
        }
        .header-left-group { display: flex; align-items: center; gap: 12px; }
        .logo-frame { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--cyan); overflow: hidden; background: #111; display: flex; align-items: center; justify-content: center; }
        .logo-frame img { width: 100%; height: 100%; object-fit: contain; }
        .brand-img { height: 16px; object-fit: contain; opacity: 0.9; }

        /* 🛡️ FIX #5: SEARCH BAR BELOW HEADER (Full Width) */
        .search-container { padding: 15px; margin-top: 5px; }
        .search-input-box {
            background: #111; border: 1px solid var(--border); border-radius: 16px;
            padding: 14px 20px; display: flex; align-items: center; gap: 12px;
            color: #555; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .search-input-box:active { transform: scale(0.98); border-color: var(--cyan); }

        /* 🛡️ FIX #6 & EXTRA #4: 8-BANNER SYSTEM (180px Height) */
        .banner-stage { margin: 10px 15px 25px; position: relative; } /* Spacing Fix #1 */
        .slider-view { 
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory; 
            scrollbar-width: none; border-radius: 22px; border: 1px solid var(--border);
            height: 180px; /* Extra #4 */
        }
        .slider-view::-webkit-scrollbar { display: none; }
        .slide { min-width: 100%; height: 100%; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; }
        .slide-dots { display: flex; justify-content: center; gap: 6px; margin-top: 10px; }
        .dot { width: 5px; height: 5px; border-radius: 50%; background: #222; transition: 0.3s; }
        .dot.active { background: var(--cyan); width: 15px; border-radius: 10px; }

        /* 🛡️ FIX #10 & EXTRA #1: GALAXY (Consistency + Animation) */
        .galaxy { display: flex; gap: 15px; padding: 10px 15px 25px; overflow-x: auto; scrollbar-width: none; position: relative; }
        .galaxy::-webkit-scrollbar { display: none; }
        
        @keyframes subtleBreathe { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
        .game-node { 
            min-width: 74px; text-align: center; position: relative; 
            animation: subtleBreathe 4s ease-in-out infinite;
            transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .game-node.active { animation: none; transform: translateY(-10px) scale(1.05); }
        
        .f-74 { 
            width: 74px; height: 74px; border-radius: 20px; background: var(--card); 
            border: 2px solid var(--border); display: flex; align-items: center; 
            justify-content: center; overflow: hidden; transition: 0.3s;
        }
        .f-74 img { width: 100%; height: 100%; object-fit: contain; padding: 10px; } /* Extra #1 */
        .game-node.active .f-74 { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0,242,255,0.3); }

        /* 🛡️ FIX #2: INDICATOR ACCURACY */
        .indicator-wrap { 
            position: absolute; bottom: 8px; height: 3px; background: var(--cyan); 
            border-radius: 10px; box-shadow: 0 0 15px var(--cyan); 
            transition: transform 0.45s cubic-bezier(0.25, 1.5, 0.5, 1), width 0.3s ease; 
            pointer-events: none; z-index: 100; transform-origin: left;
        }

        /* 🛡️ EXTRA #2 & #3: PREMIUM CARDS & BUTTONS */
        .p-card { 
            background: var(--card); padding: 22px; border-radius: 24px; 
            border: 1px solid var(--border); margin-bottom: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); /* Extra #2 */
            transition: 0.2s ease;
        }
        .order-btn { 
            width: 100%; padding: 15px; background: #fff; color: #000; 
            border-radius: 14px; border: none; font-weight: 900; margin-top: 15px; 
            transition: 0.1s;
        }
        .order-btn:active { transform: scale(0.97); } /* Extra #3 */

        /* 🛡️ FIX #8: PREMIUM FOOTER */
        footer { 
            padding: 50px 20px 140px; text-align: center; border-top: 1px solid var(--border); 
            color: rgba(255,255,255,0.2); font-size: 11px; font-weight: 600;
        }
        footer .brand { font-family: 'Orbitron'; letter-spacing: 4px; color: #333; margin-bottom: 15px; }

        /* 🛡️ FIX #9: BOTTOM NAV FEEDBACK */
        .b-nav { position: fixed; bottom: 0; width: 100%; height: var(--nav-h); background: rgba(5,5,5,0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 4000; padding-bottom: 12px; }
        .n-item { color: #444; font-size: 9px; font-weight: 800; cursor: pointer; transition: 0.3s; text-align: center; }
        .n-item:active { transform: scale(0.9); opacity: 0.7; }
        .n-item.active { color: var(--cyan); transform: translateY(-3px); }
    </style>
</head>
<body>

<header>
    <div class="header-left-group">
        <svg viewBox="0 0 24 24" style="width:26px; fill:#fff;"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        <div class="logo-frame"><img src="assets/logo.png" onerror="this.parentElement.style.background='var(--cyan)'"></div>
        <img src="assets/NEXA-VAULT-BRAND.png" class="brand-img" alt="NEXA VAULT">
    </div>
    <div style="width:40px; text-align:right; opacity:0.5;">
        <svg viewBox="0 0 24 24" style="width:24px; fill:#fff;"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </div>
</header>

<main>
    <div class="search-container">
        <div class="search-input-box">
            <svg viewBox="0 0 24 24" style="width:20px; fill:#444;"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <span style="font-weight:700; font-size:14px;">Search for Products...</span>
        </div>
    </div>

    <div class="banner-stage">
        <div class="slider-view" id="sMain">
            <div class="slide" style="background:#0a0a1a; color:var(--cyan);">BANNER 1</div>
            <div class="slide" style="background:#1a0a0a; color:#fff;">BANNER 2</div>
            <div class="slide" style="background:#0a1a0a; color:var(--cyan);">BANNER 3</div>
            <div class="slide" style="background:#1a1a0a; color:#fff;">BANNER 4</div>
            <div class="slide" style="background:#1a0a1a; color:var(--cyan);">BANNER 5</div>
            <div class="slide" style="background:#0a1a1a; color:#fff;">BANNER 6</div>
            <div class="slide" style="background:#000; color:var(--cyan);">BANNER 7</div>
            <div class="slide" style="background:#111; color:#fff;">BANNER 8</div>
        </div>
        <div class="slide-dots" id="dBox"></div>
    </div>

    <div style="position:relative;">
        <div class="galaxy" id="gBox"></div>
        <div class="indicator-wrap" id="nexaIndicator"></div>
    </div>

    <div id="pBox" style="padding:0 15px; min-height:150vh;"></div>

    <footer>
        <div class="brand">NEXA VAULT</div>
        <div>OFFICIAL GAMING SYSTEM v33.0</div>
        <div style="margin-top:15px; color:#222; font-weight:800; display:flex; justify-content:center; gap:20px; text-transform:uppercase; font-size:9px;">
            <span>Terms</span> | <span>Privacy</span> | <span>Contact</span>
        </div>
    </footer>
</main>

<nav class="b-nav">
    <div class="n-item active"><svg viewBox="0 0 24 24" style="width:22px; fill:currentColor;"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><div>HOME</div></div>
    <div class="n-item"><svg viewBox="0 0 24 24" style="width:22px; fill:currentColor;"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg><div>SEARCH</div></div>
    <div class="n-item"><svg viewBox="0 0 24 24" style="width:22px; fill:currentColor;"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><div>PROFILE</div></div>
</nav>

<script src="config.js"></script>
<script src="products.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    const games = (typeof GAME_NAMES !== 'undefined') ? GAME_NAMES : {'ff':{name:'Free Fire'},'bgmi':{name:'BGMI'}};
    const gBox = document.getElementById('gBox'), sMain = document.getElementById('sMain'), dBox = document.getElementById('dBox');

    // 🛡️ ICON RENDER
    gBox.innerHTML = Object.keys(games).map((id, i) => `
        <div class="game-node" id="g-${id}" onclick="selG('${id}',this)" style="animation-delay:${i*0.2}s">
            <div class="f-74"><img src="assets/${id}.png" onerror="this.src='assets/logo.png'"></div>
            <div style="font-size:9px; margin-top:10px; color:#555; font-weight:800; text-transform:uppercase;">${games[id].name}</div>
        </div>`).join("");

    // 🛡️ FIX #11: BANNER AUTO-SLIDE PAUSE/RESUME
    const count = 8;
    dBox.innerHTML = Array.from({length:count}).map((_,i)=>`<div class="dot ${i===0?'active':''}"></div>`).join("");
    let curS = 0, isPaused = false, autoInt;

    const startAuto = () => {
        clearInterval(autoInt);
        autoInt = setInterval(() => {
            if(!isPaused){
                curS = (curS + 1) % count;
                sMain.scrollTo({left: sMain.offsetWidth * curS, behavior: 'smooth'});
            }
        }, 4000);
    };

    sMain.addEventListener('touchstart', () => isPaused = true);
    sMain.addEventListener('touchend', () => { isPaused = false; setTimeout(startAuto, 1000); });
    sMain.onscroll = () => {
        const idx = Math.round(sMain.scrollLeft / sMain.offsetWidth);
        document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active', i===idx));
    };
    startAuto();

    // 🛡️ FIX #2: INDICATOR ACCURACY (The Pro Logic)
    let indTimeout;
    window.selG = (id, el) => {
        const indicator = document.getElementById('nexaIndicator');
        document.querySelectorAll('.game-node').forEach(c => c.classList.remove('active'));
        el.classList.add('active');

        clearTimeout(indTimeout);
        const rect = el.getBoundingClientRect();
        const parentRect = gBox.getBoundingClientRect();
        const targetX = rect.left - parentRect.left + gBox.scrollLeft;

        indicator.style.width = rect.width + "px";
        indicator.style.transform = `translateX(${targetX}px) scaleX(1.3)`;
        
        indTimeout = setTimeout(() => {
            indicator.style.transform = `translateX(${targetX}px) scaleX(1)`;
        }, 180);

        el.scrollIntoView({behavior:'smooth', inline:'center'});
        
        // Product Load
        const pData = (typeof PRODUCTS !== 'undefined') ? PRODUCTS.filter(p => p.game === id) : [];
        document.getElementById('pBox').innerHTML = pData.map(p => `
            <div class="p-card">
                <div style="font-weight:800; font-size:15px;">${p.name}</div>
                <div style="color:var(--cyan); font-weight:900; font-size:20px; margin-top:6px;">₹${p.price}</div>
                <button class="order-btn">ORDER NOW</button>
            </div>`).join("");
    };

    setTimeout(() => document.querySelector('.game-node').click(), 500);
});
</script>
</body>
</html>
