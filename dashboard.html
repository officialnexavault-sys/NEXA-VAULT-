<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa Vault | Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
    --cyan:#00f2ff;
    --bg:#050505;
    --glass:rgba(0,0,0,0.85);
}

/* BASE */
body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:#fff;
    overflow-x:hidden;
    padding-bottom:80px;
}

/* HEADER */
#header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 20px;
    background:var(--glass);
    backdrop-filter:blur(15px);
    position:sticky;
    top:0;
    z-index:1000;
}

#logo{
    height:40px;
    mix-blend-mode:screen;
    filter:drop-shadow(0 0 8px var(--cyan));
}

/* MENU BUTTON */
#menu-btn{
    width:28px;
    height:18px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    cursor:pointer;
}

#menu-btn span{
    height:3px;
    background:var(--cyan);
    border-radius:10px;
    transition:.4s;
}

#menu-btn.active span:nth-child(1){
    transform:translateY(7px) rotate(45deg);
}
#menu-btn.active span:nth-child(2){
    opacity:0;
}
#menu-btn.active span:nth-child(3){
    transform:translateY(-7px) rotate(-45deg);
}

/* SIDEBAR */
#sidebar{
    position:fixed;
    top:0;
    right:0;
    transform:translateX(100%);
    width:280px;
    height:100%;
    background:#0a0a0a;
    padding:80px 20px;
    transition:.5s;
    z-index:1001;
}
#sidebar.active{
    transform:translateX(0);
}

.nav-link{
    display:block;
    color:#aaa;
    text-decoration:none;
    padding:15px 0;
}
.nav-link:hover{
    color:var(--cyan);
}

/* OVERLAY */
#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    opacity:0;
    pointer-events:none;
    transition:.3s;
}
#overlay.active{
    opacity:1;
    pointer-events:auto;
}

/* WALLET */
.wallet{
    margin:20px;
    padding:20px;
    border-radius:20px;
    border:1px solid rgba(0,242,255,0.2);
}

.amount{
    font-size:32px;
    font-family:'Orbitron';
}

/* GAMES */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    padding:20px;
}

.card{
    background:#111;
    border-radius:15px;
    padding:15px;
    text-align:center;
}
</style>
</head>

<body>

<header id="header">
    <img src="assets/Nexa-vault-brand.png" id="logo">
    <div id="menu-btn">
        <span></span>
        <span></span>
        <span></span>
    </div>
</header>

<div id="sidebar">
    <a href="#" class="nav-link">Dashboard</a>
    <a href="wallet.html" class="nav-link">Wallet</a>
    <a href="games.html" class="nav-link">Games</a>
</div>

<div id="overlay"></div>

<div class="wallet">
    <div>Balance</div>
    <div class="amount" id="balance">₹0</div>
</div>

<div class="grid">
    <div class="card">FREE FIRE</div>
    <div class="card">COMING SOON</div>
</div>

<script>
const btn=document.getElementById("menu-btn");
const sidebar=document.getElementById("sidebar");
const overlay=document.getElementById("overlay");

btn.onclick=()=>{
    btn.classList.toggle("active");
    sidebar.classList.toggle("active");
    overlay.classList.toggle("active");
};

overlay.onclick=()=>{
    btn.classList.remove("active");
    sidebar.classList.remove("active");
    overlay.classList.remove("active");
};

document.addEventListener("keydown",e=>{
    if(e.key==="Escape"){
        btn.classList.remove("active");
        sidebar.classList.remove("active");
        overlay.classList.remove("active");
    }
});

/* BALANCE ANIMATION */
let val=0;
let target=7860;
function run(){
    if(val<target){
        val+=Math.ceil(target/50);
        document.getElementById("balance").innerText="₹"+val;
        requestAnimationFrame(run);
    }
}
run();
</script>

</body>
</html>
