<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexa Vault v27.0 | Final Architect</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* 🔒 [NEXA CONSTITUTION - IMMUTABLE LOCKS] */
        :root { --bg:#050505; --card:#0d0d0d; --cyan:#00f2ff; --radius:24px; --sidebar-w:280px; }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; outline:none; }
        html { scroll-behavior: smooth; }
        body { background:var(--bg); color:#fff; font-family: 'Inter', sans-serif; overflow-x:hidden; }

        /* 🛡️ HEADER & DYNAMIC 'X' MENU */
        #header { display:flex; align-items:center; justify-content:space-between; padding:0 20px; height:90px; border-bottom:1px solid rgba(255,255,255,0.05); position:sticky; top:0; background:var(--bg); z-index:1000; }
        
        .menu-btn { width:28px; height:20px; display:flex; flex-direction:column; justify-content:space-between; cursor:pointer; z-index:3500; position:relative; }
        .menu-btn span { height:3px; width:100%; background:#fff; border-radius:10px; transition:.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .menu-btn.active span:nth-child(1) { transform: translateY(8.5px) rotate(45deg); background: var(--cyan); }
        .menu-btn.active span:nth-child(2) { opacity:0; transform: translateX(-20px); }
        .menu-btn.active span:nth-child(3) { transform: translateY(-8.5px) rotate(-45deg); background: var(--cyan); }

        .brand-text { height:55px; pointer-events:none; }

        /* 🛡️ SIDEBAR (WITH PROFILE & SWIPE TO CLOSE) */
        #sidebar { position:fixed; top:0; left:0; width:var(--sidebar-w); height:100%; background:#080808; transform:translateX(-100%); transition:0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index:3000; border-right:1px solid #111; padding-top:110px; box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
        #sidebar.active { transform:translateX(0); }
        .profile-sec { padding: 0 24px 30px 24px; border-bottom: 1px solid #111; margin-bottom: 20px; }
        .side-item { padding: 15px 24px; font-weight: 700; color: #666; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .side-item:active { background: #111; color: var(--cyan); }

        #overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(5px); opacity:0; pointer-events:none; transition:0.4s; z-index:2500; }
        #overlay.active { opacity:1; pointer-events:auto; }

        /* 🛡️ BANNER & PROGRESS */
        .banner-container { margin:15px; }
        .banner { height:160px; border-radius:22px; overflow:hidden; position:relative; border:1px solid #1a1a1a; }
        .banner img { width:100%; height:100%; object-fit:cover; }
        .progress { position:absolute; bottom:0; left:0; height:3px; background:var(--cyan); box-shadow:0 0 15px var(--cyan); animation:load 4s linear infinite; }
        @keyframes load { from{width:0%} to{width:100%} }

        /* 🛡️ GAMES & ICON SYSTEM */
        .games { display:flex; gap:18px; padding:20px; overflow-x:auto; scrollbar-width:none; scroll-snap-type:x mandatory; -webkit-overflow-scrolling: touch; }
        .game { text-align:center; scroll-snap-align:center; min-width:85px; cursor:pointer; position:relative; transition: 0.3s; }
        .frame { 
            width:74px !important; height:74px !important; border-radius:var(--radius) !important; 
            background:var(--card); border:2px solid #1a1a1a; display:flex; align-items:center; 
            justify-content:center; overflow:hidden; position:relative; transition:0.3s;
        }
        .frame img { width:100% !important; height:100% !important; object-fit:contain !important; padding:8px; }
        .game.active { transform: translateY(-8px); }
        .game.active .frame { border-color:var(--cyan); box-shadow:0 0 25px rgba(0,242,255,0.4); }
        .label { font-size:10px; margin-top:12px; color:#555; font-weight:800; text-transform:uppercase; letter-spacing: 0.5px; }
        .game.active .label { color:#fff; }

        /* 🛡️ BADGE & RIPPLE */
        .badge { position:absolute; top:-5px; right:-5px; font-size:8px; padding:3px 8px; border-radius:6px; font-weight:900; z-index:10; color:#fff; animation: glow 1.5s infinite alternate; }
        .trending { background:#ff3b3b; box-shadow: 0 0 10px #ff3b3b; }
        @keyframes glow { from { opacity: 0.7; transform: scale(1); } to { opacity: 1; transform: scale(1.1); } }
        .frame::after { content:""; position:absolute; width:0; height:0; background:rgba(0,242,255,0.3); border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%); }
        .frame.ripple::after { animation:ripple .5s; }
        @keyframes ripple { to { width:150px; height:150px; opacity:0; } }

        /* 🛡️ STORE & FOOTER */
        #store { padding:0 20px 40px 20px; }
        #footer { padding: 40px 20px 120px 20px; text-align: center; border-top: 1px solid #111; color: #333; font-weight: 800; font-size: 11px; }
        .footer-links { display: flex; justify-content: center; gap: 20px; margin-top: 10px; color: #555; }

        /* 🛡️ BOTTOM NAV (CUSTOM SVGs) */
        .bottom { position:fixed; bottom:0; width:100%; height:75px; background:rgba(0,0,0,0.95); backdrop-filter: blur(15px); display:flex; justify-content:space-around; align-items:center; border-top:1px solid #111; z-index:2000; padding-bottom:15px; }
        .nav { display:flex; flex-direction:column; align-items:center; gap:5px; color:#444; transition: 0.3s; cursor: pointer; }
        .nav svg { width:22px; height:22px; fill: currentColor; transition: 0.3s; }
        .nav.active { color:var(--cyan); transform: translateY(-3px); }
    </style>
</head>
<body>

<div id="overlay"></div>
<div id="sidebar">
    <div class="profile-sec">
        <div style="width:50px; height:50px; background:#111; border-radius:50%; border:2px solid var(--cyan); display:flex; align-items:center; justify-content:center; font-size:20px; margin-bottom:15px;">👤</div>
        <div style="color:#fff; font-weight:800; font-size:16px;">HARIOM</div>
        <div style="color:#444; font-size:11px; font-weight:700;">hariom@nexavault.com</div>
    </div>
    <div class="side-item">🏠 Home</div>
    <div class="side-item">🔥 Trending</div>
    <div class="side-item">📦 My Orders</div>
    <div class="side-item" style="margin-top:20px; color:#ff3b3b;">🚪 Logout</div>
</div>

<header id="header">
    <div class="menu-btn" id="menuBtn"><span></span><span></span><span></span></div>
    <img src="assets/nexa-vault-brand.png" class="brand-text">
    <div style="width:28px;"></div>
</header>

<main>
    <div class="banner-container">
        <div class="banner">
            <img id="bannerImg" src="assets/banner1.jpg" onerror="this.src='https://via.placeholder.com/400x160/0d0d0d/00f2ff?text=NEXA+VAULT'">
            <div class="progress"></div>
        </div>
    </div>
    <div class="games" id="game_box"></div>
    <div id="store"></div>
    
    <footer id="footer">
        <div style="font-family: 'Orbitron'; letter-spacing: 2px;">© 2026 NEXA VAULT</div>
        <div class="footer-links">
            <span>Terms</span> | <span>Privacy</span> | <span>Contact</span>
        </div>
    </footer>
</main>

<div class="bottom">
    <div class="nav active"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>HOME</span></div>
    <div class="nav"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg><span>SEARCH</span></div>
    <div class="nav"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>PROFILE</span></div>
</div>

<script src="config.js"></script>
<script src="products.js"></script>
<script>
const NexaEngine = {
    init() {
        this.render();
        this.sidebar();
        this.banner();
        this.ripple();
        setTimeout(() => document.querySelector('.game').click(), 300);
    },
    sidebar() {
        const btn = document.getElementById('menuBtn'), side = document.getElementById('sidebar'), over = document.getElementById('overlay');
        let startX = 0;
        const toggle = () => { btn.classList.toggle('active'); side.classList.toggle('active'); over.classList.toggle('active'); };
        btn.onclick = toggle; over.onclick = toggle;

        side.addEventListener('touchstart', e => { startX = e.touches[0].clientX; });
        side.addEventListener('touchmove', e => {
            let diff = e.touches[0].clientX - startX;
            if (diff < 0) side.style.transform = `translateX(${diff}px)`;
        });
        side.addEventListener('touchend', e => {
            side.style.transform = "";
            if (startX - e.changedTouches[0].clientX > 100) toggle();
        });
    },
    render() {
        const box = document.getElementById("game_box");
        if(typeof GAME_NAMES === 'undefined') return;
        box.innerHTML = Object.keys(GAME_NAMES).map(id => `
            <div class="game" onclick="selectGame('${id}',this)">
                <div class="frame">
                    ${GAME_NAMES[id].tag?`<span class="badge ${GAME_NAMES[id].tag.toLowerCase()}">${GAME_NAMES[id].tag}</span>`:""}
                    <img src="assets/${id}.png" onerror="this.src='assets/logo.png'">
                </div>
                <div class="label">${GAME_NAMES[id].name}</div>
            </div>`).join("");
    },
    banner() {
        const banners = ["assets/banner1.jpg","assets/banner2.jpg"]; let i = 0;
        setInterval(() => {
            i = (i+1)%banners.length; document.getElementById("bannerImg").src = banners[i];
        }, 4000);
    },
    ripple() {
        document.addEventListener("click", e => {
            let f = e.target.closest(".frame"); if(!f) return;
            f.classList.remove("ripple"); void f.offsetWidth; f.classList.add("ripple");
        });
    }
};

function selectGame(id, el) {
    document.querySelectorAll(".game").forEach(g => g.classList.remove("active"));
    el.classList.add("active");
    el.scrollIntoView({ behavior: "smooth", inline: "center" });

    const data = PRODUCTS.filter(p => p.game === id);
    document.getElementById("store").innerHTML = data.map(p => `
        <div style="background:var(--card); padding:22px; border-radius:22px; border:1px solid #1a1a1a; margin-bottom:15px; animation: glow 0.3s ease;">
            <div style="font-weight:800; font-size:15px;">${p.name}</div>
            <div style="color:var(--cyan); font-weight:900; font-size:20px; margin-top:8px;">₹${p.price}</div>
            <button style="width:100%; padding:15px; border-radius:14px; border:none; background:#fff; color:#000; font-weight:900; margin-top:15px;">ORDER NOW</button>
        </div>`).join("");
}

document.addEventListener("DOMContentLoaded", () => NexaEngine.init());
</script>
</body>
</html>
