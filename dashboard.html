<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa Vault | v0.041 Insane UI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505; --card: #0d0d0d; --cyan: #00f2ff;
            --border: rgba(255,255,255,0.08); --red: #ff3c3c;
        }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        /* ⬇️ 🅱️ HEADER & APPLE-STYLE MENU ⬇️ */
        #header { 
            display: flex; align-items: center; padding: 0 16px; height: 85px; 
            background: #050505; border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; z-index: 1000; position: relative;
        }

        /* 🛑 Buttery Smooth Hamburger 🛑 */
        .menu-btn { 
            position: absolute; left: 16px; z-index: 2100; cursor: pointer;
            width: 28px; height: 18px; display: flex; flex-direction: column; justify-content: space-between;
            transition: transform 0.2s ease; /* Press effect */
        }
        .menu-btn:active { transform: scale(0.85); } /* Micro-interaction */

        .menu-btn span {
            display: block; width: 100%; height: 2.5px; background: #fff;
            border-radius: 10px; 
            transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s ease;
        }
        .menu-btn.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .menu-btn.active span:nth-child(2) { opacity: 0; transform: translateX(-15px); }
        .menu-btn.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        .logo-raised { position: absolute; left: 65px; height: 42px; width: 42px; border-radius: 12px; object-fit: cover; }
        .brand-text-wrapper { position: absolute; left: 50%; transform: translateX(-50%); }
        .brand-text { height: 62px; filter: drop-shadow(0 0 12px rgba(0,242,255,0.35)); }

        /* ⬇️ 🅴 SIDEBAR: DEPTH + DRAG READY ⬇️ */
        #sidebar { 
            position: fixed; top: 0; left: 0; width: 280px; height: 100%; 
            background: #080808; transform: translateX(-100%); 
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 2000; 
            padding: 95px 20px; border-right: 1px solid var(--border);
            box-shadow: 10px 0 40px rgba(0,0,0,0.7); /* Depth feel */
            touch-action: none; /* Critical for dragging */
        }
        #sidebar.active { transform: translateX(0); }
        
        #overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); 
            backdrop-filter: blur(12px); /* Cinematic blur */
            opacity: 0; pointer-events: none; 
            transition: 0.5s ease; z-index: 1500; 
        }
        #overlay.active { opacity: 1; pointer-events: auto; }

        /* Rest UI: Professional Compact (v0.040 Standard) */
        .games-area { display: flex; gap: 18px; padding: 25px 18px; overflow-x: auto; scrollbar-width: none; }
        .game-item { min-width: 75px; text-align: center; cursor: pointer; position: relative; }
        .frame { width: 70px; height: 70px; border-radius: 22px; border: 1.5px solid #1a1a1a; display: flex; align-items: center; justify-content: center; overflow: hidden; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .game-item.active .frame { border-color: var(--cyan); transform: translateY(-12px); box-shadow: 0 0 25px rgba(0,242,255,0.25); }
        .label { font-size: 9px; margin-top: 12px; color: #444; font-weight: 800; text-transform: uppercase; }
        .game-item.active .label { color: #fff; }
        
        #store-section { padding: 15px; border-top: 1px solid var(--border); }
        .product-card { background: var(--card); border-radius: 20px; padding: 22px; margin-bottom: 18px; border: 1px solid var(--border); position: relative; }
        .buy-btn { width: 100%; padding: 14px; background: #fff; color: #000; border-radius: 12px; font-weight: 900; margin-top: 15px; border: none; font-size: 11px; text-transform: uppercase; }
    </style>
</head>
<body>

    <header id="header">
        <div class="menu-btn" id="menuBtn" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
        <img src="assets/logo.png" alt="X" class="logo-raised">
        <div class="brand-text-wrapper">
            <img src="assets/nexa-vault-brand.png" alt="NEXA VAULT" class="brand-text">
        </div>
    </header>

    <div id="sidebar">
        <div style="color:var(--cyan); font-family:Orbitron; font-weight:900; font-size:18px; margin-bottom:35px; letter-spacing:1px;">NEXA SYSTEM</div>
        <div style="color:#666; font-size:14px; font-weight:700; margin-bottom:20px; cursor:pointer;">Explore Market</div>
        <div style="color:#666; font-size:14px; font-weight:700; margin-bottom:20px; cursor:pointer;">My Wallet</div>
        <div style="color:#666; font-size:14px; font-weight:700;">Contact Support 📞</div>
    </div>
    <div id="overlay" onclick="toggleMenu()"></div>

    <div class="games-area" id="games_box"></div>

    <div id="store-section">
        <div id="product_grid"></div>
    </div>

    <script src="config.js"></script>
    <script src="products.js"></script>
    
    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const menuBtn = document.getElementById('menuBtn');

        function toggleMenu() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            menuBtn.classList.toggle('active');
            // Reset transform in case it was left mid-drag
            sidebar.style.transform = ""; 
        }

        /* 🖐️ PRO DRAG-TO-CLOSE SYSTEM 🖐️ */
        let startX = 0;
        let currentX = 0;
        let isDragging = false;

        sidebar.addEventListener('touchstart', e => {
            if (!sidebar.classList.contains('active')) return;
            startX = e.touches[0].clientX;
            isDragging = true;
            sidebar.style.transition = "none"; // Stop animation for real-time drag
        });

        sidebar.addEventListener('touchmove', e => {
            if (!isDragging) return;
            currentX = e.touches[0].clientX;
            let diff = currentX - startX;

            // Only allow dragging to the LEFT (to close)
            if (diff < 0) {
                sidebar.style.transform = `translateX(${diff}px)`;
                // Dim overlay based on drag distance
                let opacityValue = 1 + (diff / 280); 
                overlay.style.opacity = Math.max(0, opacityValue);
            }
        });

        sidebar.addEventListener('touchend', e => {
            if (!isDragging) return;
            isDragging = false;
            sidebar.style.transition = "transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1)";
            overlay.style.transition = "0.5s ease";

            // If dragged more than 80px, CLOSE IT
            if (currentX - startX < -80) {
                toggleMenu();
            } else {
                sidebar.style.transform = "translateX(0)";
                overlay.style.opacity = "1";
            }
        });

        // Load Products Logic (Same as v0.040)
        function loadStore(id) {
            const grid = document.getElementById("product_grid");
            const filtered = PRODUCTS.filter(p => p.game === id);
            grid.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <span style="color:#00ff88; font-size:9px; font-weight:800;">✓ VERIFIED SELLER</span>
                    <div class="p-title">${p.name}</div>
                    <div class="p-price"><span>₹</span>${p.price}</div>
                    <button class="buy-btn" onclick="window.open('https://wa.me/91XXXXXXXXXX')">Order Now</button>
                </div>
            `).join("");
        }

        Object.keys(GAME_NAMES).forEach(id => {
            const el = document.createElement("div");
            el.className = `game-item ${id === CONFIG.defaultGame ? 'active' : ''}`;
            el.onclick = function() {
                document.querySelectorAll(".game-item").forEach(n => n.classList.remove("active"));
                this.classList.add("active");
                this.scrollIntoView({ behavior: "smooth", inline: "center" });
                loadStore(id);
            };
            el.innerHTML = `<div class="frame"><img src="assets/${id}.png"></div><div class="label">${GAME_NAMES[id].name}</div>`;
            document.getElementById("games_box").appendChild(el);
        });

        window.onload = () => loadStore(CONFIG.defaultGame);
    </script>
</body>
</html>
