<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexa Vault v37 | God-Tier Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #0d0d0d; --cyan: #00f2ff; --border: rgba(255,255,255,0.08); --header-h: 80px; --nav-h: 75px; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; transition: background 0.5s ease; }

        /* 🛡️ HEADER & BRANDING */
        header { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15px; height: var(--header-h); background: rgba(5,5,5,0.9);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 5000;
        }
        .h-left { display: flex; align-items: center; gap: 10px; }
        .logo-frame { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); overflow: hidden; background: #111; display: flex; align-items: center; justify-content: center; }
        .logo-frame img { width: 100%; height: 100%; object-fit: contain; }
        .brand-img { height: 18px; object-fit: contain; filter: drop-shadow(0 0 5px rgba(0,242,255,0.2)); }

        /* 🛡️ SEARCH FADE & SLIDE (Fix #4) */
        .search-container { 
            padding: 15px 15px 5px; 
            transition: opacity 0.3s ease, transform 0.3s ease; /* Smooth Fix #4 */
        }
        .search-box { background: #111; border: 1px solid var(--border); border-radius: 16px; padding: 12px 18px; display: flex; align-items: center; gap: 12px; color: #444; }

        /* 🛡️ BANNER & PROGRESS */
        .banner-stage { margin: 15px; position: relative; }
        .slider-view { 
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory; 
            scrollbar-width: none; border-radius: 22px; border: 1px solid var(--border); 
            height: 180px; scroll-behavior: smooth; /* Slide weight fix */
        }
        .slider-view::-webkit-scrollbar { display: none; }
        .slide { min-width: 100%; height: 100%; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 22px; background: linear-gradient(to top, rgba(0,0,0,0.6), transparent); }
        .progress-wrap { display: flex; gap: 6px; margin-top: 12px; padding: 0 5px; }
        .p-bar { flex: 1; height: 3px; background: #111; border-radius: 10px; overflow: hidden; }
        .p-fill { height: 100%; width: 0%; background: var(--cyan); box-shadow: 0 0 10px var(--cyan); transition: width 4s linear; }

        /* 🛡️ GALAXY & FOCUS MODE (Fix #5) */
        .galaxy-stage { position: relative; margin-top: 10px; transition: opacity 0.4s ease; /* Focus Fix #5 */ }
        .galaxy { display: flex; gap: 15px; padding: 35px 15px 30px; overflow-x: auto; scrollbar-width: none; }
        .galaxy::-webkit-scrollbar { display: none; }
        
        @keyframes nexaWave { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .game-node { min-width: 74px; text-align: center; position: relative; animation: nexaWave 3.5s ease-in-out infinite; transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .f-74 { width: 74px; height: 74px; border-radius: 24px; background: var(--card); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .f-74 img { width: 100%; height: 100%; object-fit: contain; padding: 10px; }
        
        /* 🔥 Selecion Glow Pulse */
        @keyframes glowPulse {
            0% { box-shadow: 0 0 10px rgba(0,242,255,0.4); }
            50% { box-shadow: 0 0 25px rgba(0,242,255,0.8); }
            100% { box-shadow: 0 0 10px rgba(0,242,255,0.4); }
        }
        .game-node.active .f-74 { border-color: var(--cyan); animation: glowPulse 2s infinite; }
        .game-node.active { animation: none; transform: translateY(-10px) scale(1.05); }

        .badge { position: absolute; top: -5px; right: -5px; font-size: 7px; padding: 3px 6px; border-radius: 5px; font-weight: 900; z-index: 10; color: #fff; text-transform: uppercase; }
        .TRENDING { background: #ff3b3b; } .HOT { background: #ff9800; color: #000; } .NEW { background: #2196f3; }

        /* 🛡️ INDICATOR LIVE TRACKING (Fix #2) */
        .indicator-wrap { position: absolute; bottom: 10px; height: 3px; background: var(--cyan); border-radius: 10px; box-shadow: 0 0 15px var(--cyan); transition: transform 0.45s cubic-bezier(0.25, 1.5, 0.5, 1), width 0.3s ease; pointer-events: none; transform-origin: left; z-index: 100; }

        /* 🛡️ PREMIUM RIPPLE (Fix #1) */
        @keyframes ripple { to { transform: scale(4); opacity: 0; } }
        .ripple-effect { position: fixed; width: 100px; height: 100px; background: rgba(0,242,255,0.3); border-radius: 50%; transform: scale(0); pointer-events: none; animation: ripple 0.6s linear; z-index: 9999; }

        /* 🛡️ STORE & FOOTER */
        .p-card { background: var(--card); padding: 22px; border-radius: 24px; border: 1px solid var(--border); margin: 0 15px 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        .buy-btn { width: 100%; padding: 15px; background: #fff; color: #000; border-radius: 14px; border: none; font-weight: 900; margin-top: 15px; transition: 0.1s; cursor: pointer; }

        footer { padding: 60px 20px 140px; text-align: center; border-top: 1px solid var(--border); }
        .f-brand { font-family: 'Orbitron'; letter-spacing: 4px; color: #222; margin-bottom: 15px; }

        .b-nav { position: fixed; bottom: 0; width: 100%; height: var(--nav-h); background: rgba(5,5,5,0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 4000; padding-bottom: 15px; }
        .n-item { color: #444; font-size: 9px; font-weight: 800; cursor: pointer; transition: 0.3s; text-align: center; }
        .n-item.active { color: var(--cyan); transform: translateY(-3px); }
    </style>
</head>
<body>

<header>
    <div class="h-left">
        <div style="cursor:pointer;"><svg viewBox="0 0 24 24" style="width:26px; fill:#fff;"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg></div>
        <div class="logo-frame"><img src="assets/logo.png" onerror="this.parentElement.style.background='var(--cyan)'"></div>
        <img src="assets/nexa-vault-brand.png" class="brand-img" alt="NEXA VAULT">
    </div>
</header>

<main>
    <div class="search-container">
        <div class="search-box">
            <svg viewBox="0 0 24 24" style="width:20px; fill:#444;"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <span style="font-weight:700;">Search for Products...</span>
        </div>
    </div>

    <div class="banner-stage">
        <div class="slider-view" id="sMain">
            <div class="slide" style="background:#0a0a1a; color:var(--cyan);">OFFER 1</div>
            <div class="slide" style="background:#1a0a0a; color:#fff;">OFFER 2</div>
            <div class="slide" style="background:#0a1a0a; color:var(--cyan);">OFFER 3</div>
            <div class="slide" style="background:#1a1a0a; color:#fff;">OFFER 4</div>
            <div class="slide" style="background:#1a0a1a; color:var(--cyan);">OFFER 5</div>
            <div class="slide" style="background:#0a1a1a; color:#fff;">OFFER 6</div>
            <div class="slide" style="background:#000; color:var(--cyan);">OFFER 7</div>
            <div class="slide" style="background:#111; color:#fff;">OFFER 8</div>
        </div>
        <div class="progress-wrap" id="pWrap"></div>
    </div>

    <div class="galaxy-stage">
        <div class="galaxy" id="gBox"></div>
        <div class="indicator-wrap" id="nexaIndicator"></div>
    </div>

    <div id="pBox" style="min-height:150vh; padding-top:20px;"></div>

    <footer>
        <div class="f-brand">NEXA VAULT</div>
    </footer>
</main>

<nav class="b-nav">
    <div class="n-item active"><svg viewBox="0 0 24 24" style="width:22px; fill:currentColor;"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><div>HOME</div></div>
    <div class="n-item"><svg viewBox="0 0 24 24" style="width:22px; fill:currentColor;"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg><div>SEARCH</div></div>
    <div class="n-item"><svg viewBox="0 0 24 24" style="width:22px; fill:currentColor;"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><div>PROFILE</div></div>
</nav>

<script src="config.js"></script>
<script src="products.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    const games = (typeof GAME_NAMES !== 'undefined') ? GAME_NAMES : {'ff':{name:'Free Fire',tag:'TRENDING'},'bgmi':{name:'BGMI',tag:'HOT'}};
    const gBox = document.getElementById('gBox'), sMain = document.getElementById('sMain'), pWrap = document.getElementById('pWrap'), indicator = document.getElementById('nexaIndicator');

    gBox.innerHTML = Object.keys(games).map(id => `
        <div class="game-node" id="g-${id}" onclick="selG('${id}',this)">
            ${games[id].tag ? `<span class="badge ${games[id].tag}">${games[id].tag}</span>` : ''}
            <div class="f-74"><img src="assets/${id}.png" onerror="this.src='assets/logo.png'"></div>
            <div style="font-size:9px; margin-top:10px; color:#555; font-weight:800; text-transform:uppercase;">${games[id].name}</div>
        </div>`).join("");

    // 🛡️ CONTROLLED RIPPLE (Fix #1)
    document.addEventListener('click', function(e){
        const target = e.target.closest('.game-node, .buy-btn, .n-item');
        if(!target) return;
        const ripple = document.createElement("span");
        ripple.className = "ripple-effect";
        const rect = target.getBoundingClientRect();
        ripple.style.left = rect.left + rect.width/2 - 50 + "px";
        ripple.style.top = rect.top + rect.height/2 - 50 + "px";
        document.body.appendChild(ripple);
        setTimeout(()=>ripple.remove(), 600);
    });

    // 🛡️ BANNER WITH PROGRESS (Fix #3)
    const bCount = 8;
    pWrap.innerHTML = Array.from({length:bCount}).map((_,i)=>`<div class="p-bar"><div class="p-fill" id="fill-${i}"></div></div>`).join("");
    let curS = 0, autoInt;
    const startAuto = () => {
        clearInterval(autoInt);
        autoInt = setInterval(() => {
            const currentFill = document.getElementById(`fill-${curS}`);
            currentFill.style.transition = "none"; currentFill.style.width = "0%";
            curS = (curS + 1) % bCount;
            sMain.scrollTo({left: sMain.offsetWidth * curS, behavior: 'smooth'});
            setTimeout(() => {
                const nextFill = document.getElementById(`fill-${curS}`);
                nextFill.style.transition = "width 4s linear"; nextFill.style.width = "100%";
            }, 50);
        }, 4000);
    };
    sMain.addEventListener('touchstart', () => clearInterval(autoInt));
    sMain.addEventListener('touchend', () => setTimeout(startAuto, 2000));
    startAuto();

    // 🛡️ INDICATOR LIVE TRACK (Fix #2)
    let indT;
    window.selG = (id, el) => {
        document.querySelectorAll('.game-node').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        updateIndicator(el);
        el.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
        // Product Load
        const pData = (typeof PRODUCTS !== 'undefined') ? PRODUCTS.filter(p => p.game === id) : [];
        document.getElementById('pBox').innerHTML = pData.map(p => `
            <div class="p-card">
                <div style="font-weight:800; font-size:15px;">${p.name}</div>
                <div style="color:var(--cyan); font-weight:900; font-size:20px; margin-top:6px;">₹${p.price}</div>
                <button class="buy-btn">ORDER NOW</button>
            </div>`).join("");
    };

    const updateIndicator = (el) => {
        clearTimeout(indT);
        const targetX = el.offsetLeft - gBox.scrollLeft + gBox.offsetLeft;
        indicator.style.width = el.getBoundingClientRect().width + "px";
        indicator.style.transform = `translateX(${targetX}px) scaleX(1.3)`;
        indT = setTimeout(() => { indicator.style.transform = `translateX(${targetX}px) scaleX(1)`; }, 180);
    };

    gBox.addEventListener('scroll', () => {
        const active = document.querySelector('.game-node.active');
        if(active) {
            const targetX = active.offsetLeft - gBox.scrollLeft + gBox.offsetLeft;
            indicator.style.transform = `translateX(${targetX}px)`;
        }
    });

    // 🛡️ SCROLL FOCUS & FADE (Fix #4, #5)
    window.addEventListener('scroll', () => {
        const search = document.querySelector('.search-container');
        const galaxy = document.querySelector('.galaxy-stage');
        const y = window.scrollY;
        
        search.style.opacity = y > 80 ? "0" : "1";
        search.style.transform = y > 80 ? "translateY(-10px)" : "translateY(0)";
        galaxy.style.opacity = y > 120 ? "0.3" : "1";
        
        // Background Depth
        const intensity = Math.min(15, y / 40);
        document.body.style.background = `radial-gradient(circle at top, #080808, rgb(${5+intensity}, 5, 5))`;
    });

    setTimeout(() => document.querySelector('.game-node').click(), 500);
});
</script>
</body>
</html>
