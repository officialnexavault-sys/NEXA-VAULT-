<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa-Vault | Elite Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --neon: #00f2ff; --gold: #ffd700; --bg: #050505; --card: #111111; }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        /* HEADER */
        .nexa-header {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: linear-gradient(90deg, #000, #0a0a0a);
            border-bottom: 1px solid rgba(0,242,255,0.2);
        }

        .brand-left { display: flex; align-items: center; gap: 12px; }

        .brand-logo {
            width: 55px; height: 55px;
            border-radius: 50%;
            border: 2px solid var(--neon);
            box-shadow: 0 0 12px rgba(0,242,255,0.5);
            transition: 0.3s;
        }

        .brand-logo:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--neon);
        }

        .brand-name {
            font-family: 'Orbitron';
            font-size: 18px;
            background: linear-gradient(90deg, var(--neon), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-status {
            font-size: 9px;
            color: var(--neon);
            opacity: 0.7;
        }

        /* WALLET */
        .premium-wallet {
            margin: 20px;
            background: linear-gradient(135deg, #16161a, #050505);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 20px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.2s;
        }

        .premium-wallet:active { transform: scale(0.98); }

        .premium-wallet::after {
            content: '';
            position: absolute;
            top: -100%; left: -100%;
            width: 300%; height: 300%;
            background: linear-gradient(45deg, transparent, rgba(255,215,0,0.05), transparent);
            transform: rotate(45deg);
            animation: shine 4s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* SECTION */
        .section-title {
            margin: 25px 20px 15px;
            font-family: 'Orbitron';
            font-size: 12px;
            color: #666;
            display: flex;
            justify-content: space-between;
        }

        /* GAME CARDS */
        .game-scroll {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 0 20px;
            scroll-behavior: smooth;
        }

        .game-scroll::-webkit-scrollbar { display: none; }

        .game-card-elite {
            min-width: 130px;
            background: var(--card);
            border-radius: 18px;
            border: 1px solid #222;
            padding: 15px;
            text-align: center;
            transition: 0.25s;
        }

        .game-card-elite:hover {
            transform: translateY(-4px);
            border-color: var(--neon);
            box-shadow: 0 0 10px rgba(0,242,255,0.2);
        }

        .game-card-elite img {
            width: 70px; height: 70px;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        /* BUNDLES */
        .bundle-grid {
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .bundle-item {
            background: #0f0f13;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 1px solid #1a1a1a;
            transition: 0.2s;
        }

        .bundle-item:active { transform: scale(0.97); }

        .diamond-count {
            color: var(--neon);
            font-weight: 800;
            font-size: 15px;
            font-family: 'Orbitron';
        }

        .price-tag {
            color: var(--gold);
            font-size: 11px;
            margin-top: 5px;
            font-weight: bold;
        }

        /* BUTTON */
        .elite-btn {
            width: 100%;
            margin-top: 10px;
            background: linear-gradient(90deg, var(--neon), #00c3ff);
            border: none;
            padding: 8px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.2s;
        }

        .elite-btn:hover {
            box-shadow: 0 0 15px var(--neon);
        }

        .elite-btn:active {
            transform: scale(0.95);
        }

        /* NAV */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid #1a1a1a;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
        }

        .nav-item {
            font-size: 9px;
            color: #555;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }

        .nav-item.active {
            color: var(--neon);
            text-shadow: 0 0 10px var(--neon);
        }

        .nav-item:active { transform: scale(0.9); }
    </style>
</head>

<body>

<header id="nexa-header-system">
    
    <div class="logo-container">
        <img src="assets/nexa-vault-brand.png" alt="NEXA VAULT" id="main-nexa-logo">
    </div>

    <div id="view-all-btn" onclick="window.location.href='games.html'">
        <span class="top-text">Top Games</span>
        <span class="view-text">View All ›</span>
    </div>

</header>
