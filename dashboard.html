<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexa Vault v32.5 | The Ultimate Illusion</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #0d0d0d; --cyan: #00f2ff; --radius: 24px; --border: rgba(255, 255, 255, 0.08); --header-h: 85px; --nav-h: 75px; --font-brand: 'Orbitron', sans-serif; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; transition: background 0.5s ease; }

        /* 🛡️ HEADER & SEARCH UX */
        header { display: flex; align-items: center; justify-content: space-between; padding: 0 15px; height: var(--header-h); background: rgba(5,5,5,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 2000; }
        .h-center { display: flex; align-items: center; gap: 8px; position: absolute; left: 50%; transform: translateX(-50%); }
        .logo-box { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--cyan); overflow: hidden; }
        .logo-box img { width: 100%; height: 100%; object-fit: contain; }

        #s-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: none; padding: 20px; }
        .s-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .s-box { flex: 1; background: #111; border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: flex; align-items: center; position: relative; }
        .s-box input { background: none; border: none; color: #fff; width: calc(100% - 25px); outline: none; font-weight: 600; }
        .clear-s { position: absolute; right: 12px; cursor: pointer; display: none; }

        /* 🛡️ BANNER */
        .slider-view { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; border-radius: 22px; border: 1px solid var(--border); margin: 15px; }
        .slider-view::-webkit-scrollbar { display: none; }
        .slide { min-width: 100%; height: 160px; scroll-snap-align: start; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .dots { display: flex; justify-content: center; gap: 8px; margin-top: -5px; margin-bottom: 15px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: #222; transition: 0.3s; }
        .dot.active { background: var(--cyan); width: 18px; border-radius: 10px; }

        /* 🛡️ GALAXY & WAVE ANIMATION */
        .galaxy { display: flex; gap: 15px; padding: 10px 15px; overflow-x: auto; scrollbar-width: none; position: relative; }
        .galaxy::-webkit-scrollbar { display: none; }
        
        @keyframes nexaWave {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }

        .game-node { 
            min-width: 74px; text-align: center; position: relative; 
            animation: nexaWave 3.5s ease-in-out infinite;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* STAGGERED BREATHING */
        .game-node:nth-child(1) { animation-delay: 0s; }
        .game-node:nth-child(2) { animation-delay: 0.3s; }
        .game-node:nth-child(3) { animation-delay: 0.6s; }
        .game-node:nth-child(4) { animation-delay: 0.9s; }
        .game-node:nth-child(5) { animation-delay: 1.2s; }
        
        .frame-74 { width: 74px; height: 74px; border-radius: 20px; background: var(--card); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; overflow: hidden; transition: 0.3s; }
        .frame-74 img { width: 100%; height: 100%; object-fit: contain; padding: 10px; }
        
        .badge { position: absolute; top: -5px; right: -5px; font-size: 7px; padding: 3px 6px; border-radius: 5px; font-weight: 900; z-index: 10; color: #fff; text-transform: uppercase; transition: 0.3s; }
        .b-trending { background: #ff3b3b; box-shadow: 0 0 10px #ff3b3b; }
        .b-hot { background: #ff9800; color: #000; box-shadow: 0 0 10px #ff9800; }
        .b-new { background: #2196f3; box-shadow: 0 0 10px #2196f3; }

        /* 🔥 GUPT FIX 3: MICRO GLOW PULSE */
        @keyframes glowPulse {
            0% { box-shadow: 0 0 10px rgba(0,242,255,0.4); }
            50% { box-shadow: 0 0 25px rgba(0,242,255,0.8); }
            100% { box-shadow: 0 0 10px rgba(0,242,255,0.4); }
        }

        .game-node.active { animation: none; transform: translateY(-10px) scale(1.05); z-index: 10; }
        .game-node.active .frame-74 { 
            border-color: var(--cyan); 
            animation: glowPulse 2s infinite; /* Breathing Glow */
        }
        .game-node.active .badge { transform: scale(1.15); box-shadow: 0 0 12px currentColor; }

        /* INDICATOR PHYSICS */
        .indicator-wrap { position: absolute; bottom: 0; left: 15px; height: 3px; background: var(--cyan); border-radius: 10px; box-shadow: 0 0 15px var(--cyan); transform-origin: left; transition: transform 0.45s cubic-bezier(0.25, 1.5, 0.5, 1), width 0.3s ease; pointer-events: none; z-index: 100; }

        /* 🛡️ BOTTOM NAV & PAGE */
        .page { display: none; width: 100%; min-height: 100vh; padding-bottom: calc(var(--nav-h) + 20px); animation: pageFade 0.4s ease; }
        .page.active { display: block; }
        @keyframes pageFade { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

        .b-nav { position: fixed; bottom: 0; width: 100%; height: var(--nav-h); background: rgba(5,5,5,0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 4000; padding-bottom: 12px; }
        .n-btn { color: #444; text-align: center; font-size: 9px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .n-btn.active { color: var(--cyan); transform: translateY(-3px); }

        #pBox { min-height: 150vh; padding-top: 20px; }
        footer { margin-top: 40px; padding: 40px 20px 120px; text-align: center; border-top: 1px solid var(--border); font-size: 11px; }
    </style>
</head>
<body>

<div id="s-overlay">
    <div class="s-header">
        <svg onclick="toggleS()" viewBox="0 0 24 24" style="width:24px; fill:var(--cyan);"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        <div class="s-box">
            <input type="text" id="liveS" placeholder="Search games...">
            <span id="clearBtn" class="clear-s" onclick="clearS()">✖</span>
        </div>
    </div>
    <div id="resArea" style="display:grid; gap:12px; padding-bottom: 50px;"></div>
</div>

<header>
    <div style="width:40px;"><svg viewBox="0 0 24 24" style="width:24px; fill:#fff;"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg></div>
    <div class="h-center">
        <div class="logo-box"><img src="assets/logo.png" onerror="this.parentElement.style.background='var(--cyan)'"></div>
        <div style="font-family:var(--font-brand); font-size:14px; letter-spacing:1.5px;">NEXA <span style="color:var(--cyan); font-weight:400;">VAULT</span></div>
    </div>
    <div style="width:40px; text-align:right;" onclick="toggleS()"><svg viewBox="0 0 24 24" style="width:22px; fill:#fff; opacity:0.6;"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></div>
</header>

<main id="home-p" class="page active">
    <div class="slider-view" id="sMain">
        <div class="slide"><img src="assets/banner1.jpg" onerror="this.src='https://via.placeholder.com/400x160/0d0d0d/00f2ff?text=DEAL+1'"></div>
        <div class="slide"><img src="assets/banner2.jpg" onerror="this.src='https://via.placeholder.com/400x160/0d0d0d/00f2ff?text=NEW+DEAL'"></div>
    </div>
    <div class="dots" id="dBox"></div>

    <div style="position:relative;">
        <div class="galaxy" id="gBox"></div>
        <div class="indicator-wrap" id="nexaIndicator"></div>
    </div>

    <div id="pBox" style="padding:0 15px;"></div>

    <footer>
        <div style="font-family:'Orbitron'; color:#555; letter-spacing:2px;">© 2026 NEXA VAULT</div>
        <div style="margin-top:15px; color:#333; font-weight:800; display:flex; justify-content:center; gap:20px;">
            <span>Terms</span> | <span>Privacy</span> | <span>Contact</span>
        </div>
    </footer>
</main>

<main id="profile-p" class="page">
    <div style="padding:40px 20px; text-align:center;">
        <div style="width:80px; height:80px; background:#111; border-radius:50%; border:2px solid var(--cyan); margin:0 auto; display:flex; align-items:center; justify-content:center; color:var(--cyan); font-size:32px;">👤</div>
        <h2 style="margin-top:20px;">NEXA GUEST</h2>
        <p style="color:#444; font-weight:800; font-size:12px;">LOGIN REQUIRED</p>
    </div>
</main>

<nav class="b-nav">
    <div class="n-btn active" onclick="switchN('home',this)"><svg viewBox="0 0 24 24" style="width:22px; fill:currentColor;"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><div>HOME</div></div>
    <div class="n-btn" onclick="toggleS()"><svg viewBox="0 0 24 24" style="width:22px; fill:currentColor;"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg><div>SEARCH</div></div>
    <div class="n-btn" onclick="switchN('profile',this)"><svg viewBox="0 0 24 24" style="width:22px; fill:currentColor;"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><div>PROFILE</div></div>
</nav>

<script src="config.js"></script>
<script src="products.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    const games = (typeof GAME_NAMES !== 'undefined') ? GAME_NAMES : {'ff':{name:'Free Fire',tag:'TRENDING'},'bgmi':{name:'BGMI',tag:'HOT'},'cod':{name:'COD Mobile',tag:'NEW'}};
    const gBox = document.getElementById('gBox'), sMain = document.getElementById('sMain'), dBox = document.getElementById('dBox'), indicator = document.getElementById('nexaIndicator');

    gBox.innerHTML = Object.keys(games).map(id => {
        const tag = games[id].tag;
        const bClass = tag === 'TRENDING' ? 'b-trending' : tag === 'HOT' ? 'b-hot' : 'b-new';
        return `
        <div class="game-node" id="g-${id}" onclick="nexaActivate('${id}',this)">
            ${tag ? `<span class="badge ${bClass}">${tag}</span>` : ''}
            <div class="frame-74"><img src="assets/${id}.png" onerror="this.src='assets/logo.png'"></div>
            <div style="font-size:9px; margin-top:10px; color:#555; font-weight:800; text-transform:uppercase;">${games[id].name}</div>
        </div>`;
    }).join("");

    // 🔥 GUPT FIX 1: SMART PAUSE SYSTEM (Idle Animation Control)
    let idleTimer;
    const pauseWave = () => {
        document.querySelectorAll('.game-node').forEach(n => n.style.animationPlayState = 'paused');
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => {
            document.querySelectorAll('.game-node').forEach(n => n.style.animationPlayState = 'running');
        }, 1500);
    };
    document.addEventListener('touchstart', pauseWave);
    document.addEventListener('scroll', pauseWave);

    // 🔥 GUPT FIX 2: INDICATOR TIMEOUT FIX (No Jitter)
    let indTimeout;
    window.nexaActivate = (id, el) => {
        document.querySelectorAll('.game-node').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        
        clearTimeout(indTimeout);
        const targetX = el.offsetLeft - gBox.scrollLeft;
        indicator.style.width = el.getBoundingClientRect().width + "px";
        indicator.style.transform = `translateX(${targetX}px) scaleX(1.3)`;
        
        indTimeout = setTimeout(() => {
            indicator.style.transform = `translateX(${targetX}px) scaleX(1)`;
        }, 180);

        el.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
        const pData = (typeof PRODUCTS !== 'undefined') ? PRODUCTS.filter(p => p.game === id) : [];
        document.getElementById('pBox').innerHTML = pData.length ? pData.map(p => `
            <div style="background:var(--card); padding:20px; border-radius:22px; border:1px solid var(--border); margin-bottom:15px; animation:pageFade .3s;">
                <div style="font-weight:800; font-size:14px;">${p.name}</div>
                <div style="color:var(--cyan); font-weight:900; font-size:18px; margin-top:5px;">₹${p.price}</div>
                <button style="width:100%; padding:14px; background:#fff; border:none; border-radius:12px; font-weight:900; margin-top:15px;">ORDER NOW</button>
            </div>`).join("") : `<div style="text-align:center; padding:40px; color:#333; font-weight:800;">No Products Available</div>`;
    };

    // BANNER & SEARCH LOGIC
    const count = sMain.children.length;
    dBox.innerHTML = Array.from({length:count}).map((_,i)=>`<div class="dot ${i===0?'active':''}"></div>`).join("");
    let curS = 0, isInter = false;
    let autoInt = setInterval(() => { if(!isInter){ curS=(curS+1)%count; sMain.scrollTo({left: sMain.offsetWidth*curS, behavior: 'smooth'}); } }, 4000);
    sMain.onscroll = () => { const idx = Math.round(sMain.scrollLeft / sMain.offsetWidth); document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active', i===idx)); };
    sMain.addEventListener('touchstart', () => { isInter = true; clearInterval(autoInt); });

    window.toggleS = () => { const o = document.getElementById('s-overlay'); o.style.display = o.style.display === 'block' ? 'none' : 'block'; if(o.style.display==='block') document.getElementById('liveS').focus(); };
    window.clearS = () => { document.getElementById('liveS').value = ""; document.getElementById('resArea').innerHTML = ""; document.getElementById('clearBtn').style.display = "none"; };
    document.getElementById('liveS').oninput = (e) => {
        const v = e.target.value.toLowerCase(), res = document.getElementById('resArea'), clear = document.getElementById('clearBtn');
        clear.style.display = v ? "block" : "none";
        if(!v) { res.innerHTML = ""; return; }
        const matched = Object.keys(games).filter(id => games[id].name.toLowerCase().includes(v));
        res.innerHTML = matched.map(id => `<div onclick="nexaActivate('${id}',document.getElementById('g-${id}')); toggleS();" style="background:var(--card); padding:15px; border-radius:12px; border:1px solid var(--border);">${games[id].name}</div>`).join("");
    };

    window.switchN = (pid, el) => { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.querySelectorAll('.n-btn').forEach(b => b.classList.remove('active')); document.getElementById(pid + '-p').classList.add('active'); el.classList.add('active'); };
    
    // SCROLL GLOW THROTTLE
    let ticking = false;
    window.addEventListener('scroll', () => {
        if (!ticking) { window.requestAnimationFrame(() => {
            const intensity = Math.min(15, window.scrollY / 40);
            document.body.style.background = `radial-gradient(circle at top, #080808, rgb(${5+intensity}, 5, 5))`;
            ticking = false;
        }); ticking = true; }
    });

    setTimeout(() => document.querySelector('.game-node').click(), 500);
});
</script>
</body>
</html>
