<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa Vault | v18.0 Lock-Patch</title>
    <style>
        /* 🔒 [LOCK ZONE - इसे कभी मत छेड़ना] */
        :root { --bg: #050505; --card: #0d0d0d; --cyan: #00f2ff; --radius: 24px; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; overflow-x: hidden; }

        /* 🛡️ ICON HARD LOCK - 24PX CURVE & NO STRETCH */
        .frame { 
            width: 74px !important; height: 74px !important; 
            border-radius: var(--radius) !important; 
            border: 2px solid #1a1a1a !important; 
            background: var(--card) !important; 
            display: flex !important; align-items: center !important; justify-content: center !important; 
            overflow: hidden !important; position: relative;
        }
        .frame img { 
            width: 100% !important; height: 100% !important; 
            object-fit: contain !important; /* 🚀 आइकॉन पूरा दिखेगा */
            padding: 8px; 
            border-radius: var(--radius) !important;
        }

        /* 🛡️ BADGE SYSTEM (TRENDING/HOT/NEW) */
        .badge { position: absolute; top: -5px; right: -5px; font-size: 8px; padding: 3px 8px; border-radius: 6px; font-weight: 900; z-index: 10; color: #fff; text-transform: uppercase; }
        .badge.trending { background: #ff3b3b; }
        .badge.hot { background: #ff9800; color: #000; }
        .badge.new { background: #2196f3; }
        
        /* 🛡️ HEADER & LAYOUT */
        #header { height: 95px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .games-area { display: flex; gap: 20px; padding: 25px 20px; overflow-x: auto; scrollbar-width: none; }
        .game-item { min-width: 80px; text-align: center; cursor: pointer; position: relative; transition: 0.2s; }
        .game-item:active { transform: scale(0.9); }
        .label { font-size: 9px; margin-top: 10px; color: #555; font-weight: 800; }
    </style>
</head>
<body>

    <header id="header">
        <div style="width:30px;"></div>
        <img src="assets/logo.png" style="height:48px; border-radius:50%;">
        <img src="assets/nexa-vault-brand.png" style="height:60px; filter:none; background:transparent;">
        <div style="width:30px;"></div>
    </header>

    <div id="banner-slot" style="width:100%; height:160px; margin-top:10px; border: 1px dashed #222;"></div>

    <main>
        <div class="games-area" id="game_box"></div>
        <div id="store_section" style="padding: 20px;"></div>
    </main>

    <script src="config.js"></script>
    <script src="products.js"></script>

    <script>
        // 🚀 THE STABLE ENGINE
        document.addEventListener("DOMContentLoaded", () => {
            const box = document.getElementById("game_box");
            if (typeof GAME_NAMES === 'undefined') return;

            box.innerHTML = Object.keys(GAME_NAMES).map(id => {
                const data = GAME_NAMES[id];
                const tagClass = data.tag ? data.tag.toLowerCase() : "";
                return `
                    <div class="game-item" onclick="loadStore('${id}', this)">
                        ${data.tag ? `<span class="badge ${tagClass}">${data.tag}</span>` : ""}
                        <div class="frame"><img src="assets/${id}.png" onerror="this.src='assets/logo.png'"></div>
                        <p class="label">${data.name}</p>
                    </div>
                `;
            }).join("");
        });

        function loadStore(id, el) {
            document.querySelectorAll('.game-item').forEach(i => i.style.opacity = "0.5");
            el.style.opacity = "1";
            
            const container = document.getElementById("store_section");
            const data = PRODUCTS.filter(p => p.game === id);
            container.innerHTML = data.map(p => `
                <div style="background:var(--card); padding:20px; border-radius:20px; border:1px solid #1a1a1a; margin-bottom:15px;">
                    <div style="font-weight:800;">${p.name}</div>
                    <div style="color:var(--cyan); font-weight:900; margin-top:5px;">₹${p.price}</div>
                    <button style="width:100%; padding:12px; border-radius:12px; border:none; background:#fff; font-weight:900; margin-top:15px;">Order Now</button>
                </div>
            `).join("");
        }
    </script>
</body>
</html>
