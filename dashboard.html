<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexa Vault v30.1 | Final Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505; --card: #0d0d0d; --cyan: #00f2ff; --radius: 24px;
            --border: rgba(255, 255, 255, 0.08); --header-h: 85px; --nav-h: 75px;
            --sidebar-w: 280px; --font-main: 'Inter', sans-serif; --font-brand: 'Orbitron', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: #fff; font-family: var(--font-main); overflow-x: hidden; -webkit-overflow-scrolling: touch; }

        /* 🛡️ PAGE ENGINE */
        .page { display: none; width: 100%; min-height: 100vh; padding-bottom: calc(var(--nav-h) + 20px); }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 🛡️ HEADER & SEARCH */
        header { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: var(--header-h); background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 2000; }
        .menu-btn { width: 30px; height: 20px; position: relative; cursor: pointer; z-index: 4000; }
        .menu-btn span { position: absolute; width: 100%; height: 3px; background: #fff; border-radius: 10px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .menu-btn span:nth-child(1) { top: 0; } .menu-btn span:nth-child(2) { top: 50%; transform: translateY(-50%); } .menu-btn span:nth-child(3) { bottom: 0; }
        .menu-btn.active span:nth-child(1) { transform: translateY(8.5px) rotate(45deg); background: var(--cyan); }
        .menu-btn.active span:nth-child(2) { opacity: 0; } .menu-btn.active span:nth-child(3) { transform: translateY(-8.5px) rotate(-45deg); background: var(--cyan); }

        /* 🛡️ SEARCH OVERLAY (REAL LOGIC) */
        #search-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .search-input-box { background: #111; border: 1px solid var(--border); border-radius: 15px; padding: 12px 18px; display: flex; align-items: center; gap: 10px; }
        .search-input-box input { background: none; border: none; color: #fff; flex: 1; font-size: 16px; font-weight: 600; }
        
        /* 🛡️ SIDEBAR & GESTURE */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); opacity: 0; pointer-events: none; transition: 0.4s; z-index: 2500; }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .sidebar { position: fixed; top: 0; left: 0; width: var(--sidebar-w); height: 100%; background: #080808; transform: translateX(-100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 3000; border-right: 1px solid var(--border); display: flex; flex-direction: column; touch-action: none; }
        .sidebar.active { transform: translateX(0); }

        /* 🛡️ GALAXY & INDICATOR */
        .icon-row { display: flex; gap: 20px; padding: 10px 20px 25px; overflow-x: auto; scrollbar-width: none; scroll-snap-type: x mandatory; position: relative; }
        .icon-row::-webkit-scrollbar { display: none; }
        .game-node { min-width: 82px; display: flex; flex-direction: column; align-items: center; scroll-snap-align: center; cursor: pointer; position: relative; }
        .nexa-frame { width: 74px; height: 74px; border-radius: var(--radius); background: var(--card); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; overflow: hidden; transition: 0.3s; }
        .game-node.active .nexa-frame { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0,242,255,0.3); transform: translateY(-5px); }
        .indicator-wrap { position: absolute; bottom: 12px; height: 3px; background: var(--cyan); border-radius: 10px; box-shadow: 0 0 10px var(--cyan); transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); pointer-events: none; }

        /* 🛡️ BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: var(--nav-h); background: rgba(5,5,5,0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 2000; padding-bottom: 12px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #444; cursor: pointer; transition: 0.3s; }
        .nav-item svg { width: 22px; height: 22px; fill: currentColor; }
        .nav-item.active { color: var(--cyan); transform: translateY(-3px); }
    </style>
</head>
<body>

<div id="nexa-overlay" class="overlay"></div>
<aside id="nexa-sidebar" class="sidebar">
    <div style="padding: 110px 24px 30px; border-bottom: 1px solid var(--border);">
        <div style="width:55px; height:55px; background:#111; border-radius:50%; border:2px solid var(--cyan); display:flex; align-items:center; justify-content:center; color:var(--cyan); font-size:24px;">👤</div>
        <div style="margin-top:15px; font-weight:800; font-size:18px;">GUEST USER</div>
    </div>
</aside>

<div id="search-overlay">
    <div class="search-input-box">
        <input type="text" id="liveSearch" placeholder="Type game name...">
        <span onclick="toggleSearch()" style="color:var(--cyan); font-weight:800; cursor:pointer;">CLOSE</span>
    </div>
    <div id="searchResults" style="margin-top:20px; display:grid; gap:15px;"></div>
</div>

<header>
    <div class="menu-btn" id="menuBtn"><span></span><span></span><span></span></div>
    <div style="font-family:var(--font-brand); font-size:16px; letter-spacing:2px;">NEXA <span style="color:var(--cyan); font-weight:400;">VAULT</span></div>
    <div onclick="toggleSearch()" style="cursor:pointer; opacity:0.6;"><svg viewBox="0 0 24 24" style="width:24px; fill:#fff;"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></div>
</header>

<main id="home-page" class="page active">
    <div style="margin: 15px; height: 160px; border-radius: 22px; overflow: hidden; border: 1px solid var(--border);">
        <img src="assets/banner1.jpg" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.src='https://via.placeholder.com/400x160/0d0d0d/00f2ff?text=NEXA+PROMO'">
    </div>
    <div style="position:relative;">
        <div class="icon-row" id="gameRow"></div>
        <div class="indicator-wrap" id="nexaIndicator"></div>
    </div>
    <div id="product-area" style="padding: 0 20px;"></div>
</main>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="switchPage('home', this)"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>HOME</span></div>
    <div class="nav-item" onclick="toggleSearch()"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg><span>SEARCH</span></div>
    <div class="nav-item" onclick="switchPage('profile', this)"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>PROFILE</span></div>
</nav>

<script src="config.js"></script>
<script src="products.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    const gameRow = document.getElementById('gameRow');
    const indicator = document.getElementById('nexaIndicator');
    const sidebar = document.getElementById('nexa-sidebar');
    const overlay = document.getElementById('nexa-overlay');

    // 1. SIDEBAR & SWIPE (Gupt Physics Fix)
    const toggleSidebar = () => {
        document.getElementById('menuBtn').classList.toggle('active');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
    };
    document.getElementById('menuBtn').onclick = toggleSidebar;
    overlay.onclick = toggleSidebar;

    let sX = 0;
    sidebar.ontouchstart = (e) => { sX = e.touches[0].clientX; sidebar.style.transition = "none"; };
    sidebar.ontouchmove = (e) => { let d = e.touches[0].clientX - sX; if(d < 0) sidebar.style.transform = `translateX(${d}px)`; };
    sidebar.ontouchend = (e) => { sidebar.style.transition = "0.4s"; sidebar.style.transform = ""; if(sX - e.changedTouches[0].clientX > 80) toggleSidebar(); };

    // 2. GALAXY RENDER (From config.js)
    const games = (typeof GAME_NAMES !== 'undefined') ? GAME_NAMES : {'ff':{name:'Free Fire'},'bgmi':{name:'BGMI'}};
    gameRow.innerHTML = Object.keys(games).map(id => `
        <div class="game-node" id="node-${id}" onclick="nexaActivate('${id}', this)">
            <div class="nexa-frame"><img src="assets/${id}.png" onerror="this.src='assets/logo.png'"></div>
            <div style="font-size:10px; margin-top:10px; color:#555; font-weight:800; text-transform:uppercase;">${games[id].name}</div>
        </div>
    `).join("");

    window.nexaActivate = (id, el) => {
        document.querySelectorAll('.game-node').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        const r = el.getBoundingClientRect();
        indicator.style.width = r.width + "px";
        indicator.style.transform = `translateX(${el.offsetLeft - gameRow.scrollLeft}px)`;
        el.scrollIntoView({ behavior: "smooth", inline: "center" });
        loadProducts(id);
    };

    // 3. SEARCH ENGINE (Real Filter)
    window.toggleSearch = () => {
        const s = document.getElementById('search-overlay');
        s.style.display = s.style.display === 'block' ? 'none' : 'block';
        if(s.style.display === 'block') document.getElementById('liveSearch').focus();
    };

    document.getElementById('liveSearch').oninput = (e) => {
        const v = e.target.value.toLowerCase();
        const res = document.getElementById('searchResults');
        if(!v) { res.innerHTML = ""; return; }
        const matched = Object.keys(games).filter(id => games[id].name.toLowerCase().includes(v));
        res.innerHTML = matched.map(id => `<div onclick="nexaActivate('${id}', document.getElementById('node-${id}')); toggleSearch();" style="background:var(--card); padding:15px; border-radius:12px; border:1px solid var(--border);">${games[id].name}</div>`).join("");
    };

    const loadProducts = (id) => {
        const pArea = document.getElementById('product-area');
        const data = (typeof PRODUCTS !== 'undefined') ? PRODUCTS.filter(p => p.game === id) : [];
        pArea.innerHTML = data.map(p => `<div style="background:var(--card); padding:20px; border-radius:20px; border:1px solid var(--border); margin-bottom:15px;"><div style="font-weight:800;">${p.name}</div><div style="color:var(--cyan); font-weight:900; font-size:18px; margin-top:5px;">₹${p.price}</div><button style="width:100%; padding:12px; background:#fff; border:none; border-radius:12px; font-weight:900; margin-top:15px;">BUY NOW</button></div>`).join("");
    };

    setTimeout(() => { document.querySelector('.game-node').click(); }, 500);
});

window.switchPage = (pid, el) => {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
};
</script>
</body>
</html>
