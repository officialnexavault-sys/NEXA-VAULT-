<div class="quest-section" id="wishlist-area">
    <div style="color: #ffd700; font-size: 12px; font-weight: bold; margin-bottom: 10px;">🏆 YOUR DREAM DEVICE QUEST</div>
    
    <div id="setup-wishlist">
        <input type="text" id="phone-name" placeholder="Enter Your Dream Phone Name..." style="width:70%; padding:8px; background:#000; border:1px solid #333; color:#fff; font-size:10px; border-radius:5px;">
        <button onclick="setGoal()" style="padding:8px; background:#ffd700; border:none; border-radius:5px; font-size:10px; font-weight:bold;">SET GOAL</button>
    </div>

    <div id="active-goal" style="display:none;">
        <p style="font-size: 11px; color: #fff; margin: 5px 0;">Goal: <span id="display-phone" style="color:#00f2ff; font-weight:bold;"></span></p>
        <div class="p-bar"><div class="p-fill" id="goal-bar" style="width: 1%;"></div></div>
        <div style="display: flex; justify-content: space-between; font-size: 9px; color: #555;">
            <span id="prog-text">0/300 Referrals</span>
            <span>Target: Premium Unlocked</span>
        </div>
    </div>
</div>

<script>
    function setGoal() {
        const name = document.getElementById('phone-name').value;
        if(name.trim() !== "") {
            document.getElementById('setup-wishlist').style.display = 'none';
            document.getElementById('active-goal').style.display = 'block';
            document.getElementById('display-phone').innerText = name.toUpperCase();
            localStorage.setItem('user_dream_phone', name);
        } else {
            alert("Please enter a phone name!");
        }
    }

    // अगर पहले से सेट है तो दिखाओ
    window.onload = () => {
        const savedPhone = localStorage.getItem('user_dream_phone');
        if(savedPhone) {
            document.getElementById('setup-wishlist').style.display = 'none';
            document.getElementById('active-goal').style.display = 'block';
            document.getElementById('display-phone').innerText = savedPhone.toUpperCase();
        }
    }
</script>
