<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa Vault | Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* 🎨 CORE CSS (The System) */
        :root {
            --cyan: #00f2ff;
            --bg: #050505;
            --card: #121212;
            --text-gray: #888;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            user-select: none;
        }

        /* 1. HEADER SECTION (Fixed & Locked) */
        #nexa-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            gap: 15px;
        }

        .menu-btn {
            display: flex;
            flex-direction: column;
            gap: 4px;
            cursor: pointer;
        }

        .menu-btn span {
            display: block;
            width: 22px;
            height: 2px;
            background: var(--text-gray);
            border-radius: 5px;
            transition: 0.3s;
        }

        .nexa-logo-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nexa-logo-group img:first-child { height: 35px; border-radius: 50%; } /* Circle Logo */
        .nexa-logo-group img:last-child { height: 20px; mix-blend-mode: screen; } /* Brand Name */

        /* 2. CATEGORY SCROLL SECTION (Flipkart Style) */
        .category-section {
            padding: 15px 0;
            overflow: hidden;
        }

        .category-wrapper {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 0 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        /* Scrollbar छुपाने के लिए */
        .category-wrapper::-webkit-scrollbar { display: none; }

        .cat-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            min-width: 65px;
            cursor: pointer;
            position: relative;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .node-icon-wrap {
            width: 58px;
            height: 58px;
            background: var(--card);
            border-radius: 18px; /* Flipkart Style Corners */
            border: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: 0.4s;
            overflow: hidden;
        }

        .node-icon-wrap img { width: 100%; height: 100%; object-fit: cover; }

        .node-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-gray);
            text-align: center;
            transition: 0.3s;
        }

        /* ✨ ACTIVE STATE (Blue Glow & Indicator) */
        .cat-node.active .node-icon-wrap {
            border-color: var(--cyan);
            background: rgba(0, 242, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
            transform: translateY(-2px);
        }

        .cat-node.active .node-label { color: #fff; }

        .active-indicator {
            position: absolute;
            bottom: -10px;
            width: 0;
            height: 3px;
            background: var(--cyan);
            border-radius: 10px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 10px var(--cyan);
        }

        .cat-node.active .active-indicator { width: 35px; }

        /* 3. MAIN CONTENT PLACEHOLDERS */
        .main-content { padding: 0 20px; }
        .placeholder-box {
            width: 100%;
            height: 140px;
            background: #111;
            border-radius: 20px;
            border: 1px dashed #333;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            margin-top: 20px;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }

        /* Sidebar & Overlay (Basic) */
        #sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #0a0a0a; z-index: 1001; transition: 0.4s; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); opacity: 0; pointer-events: none; z-index: 999; transition: 0.3s; }
        #sidebar.active { left: 0; }
        #overlay.active { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>

    <header id="nexa-header">
        <div class="menu-btn" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
        <div class="nexa-logo-group">
            <img src="assets/logo.png" alt="Logo">
            <img src="assets/nexa-vault-brand.png" alt="Nexa Vault">
        </div>
    </header>

    <div id="sidebar"></div>
    <div id="overlay" onclick="toggleMenu()"></div>

    <div class="category-section">
        <div class="category-wrapper">
            <div class="cat-node active" onclick="activateCat(this)">
                <div class="node-icon-wrap">⭐</div>
                <span class="node-label">For You</span>
                <div class="active-indicator"></div>
            </div>
            
            <div class="cat-node" onclick="activateCat(this)">
                <div class="node-icon-wrap">
                    <img src="assets/ff_icon.png" alt="FF" onerror="this.style.display='none'; this.parentNode.innerHTML='🔥'">
                </div>
                <span class="node-label">Free Fire</span>
                <div class="active-indicator"></div>
            </div>

            <div class="cat-node" onclick="activateCat(this)">
                <div class="node-icon-wrap">
                    <img src="assets/bgmi_icon.png" alt="BGMI" onerror="this.style.display='none'; this.parentNode.innerHTML='🔫'">
                </div>
                <span class="node-label">BGMI</span>
                <div class="active-indicator"></div>
            </div>

            <div class="cat-node" onclick="activateCat(this)">
                <div class="node-icon-wrap">
                    <img src="assets/mc_icon.png" alt="MC" onerror="this.style.display='none'; this.parentNode.innerHTML='🧱'">
                </div>
                <span class="node-label">Minecraft</span>
                <div class="active-indicator"></div>
            </div>

            <div class="cat-node" onclick="activateCat(this)">
                <div class="node-icon-wrap">🛡️</div>
                <span class="node-label">Others</span>
                <div class="active-indicator"></div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="placeholder-box">BANNER SLOT (READY)</div>
        <div class="placeholder-box">GAME CARDS SLOT (READY)</div>
    </div>

    <script>
        // क्लिक करने पर कैटेगरी एक्टिव करने के लिए
        function activateCat(el) {
            document.querySelectorAll('.cat-node').forEach(node => {
                node.classList.remove('active');
            });
            el.classList.add('active');
        }

        // साइडबार खोलने/बंद करने के लिए
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
