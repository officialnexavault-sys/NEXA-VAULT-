<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa-Vault | Official Database</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #000; --card: #151518; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; text-align: center; }
        .back-nav { display: flex; align-items: center; gap: 8px; color: var(--neon); text-decoration: none; font-size: 11px; margin-bottom: 30px; font-family: 'Orbitron'; }
        
        /* Premium Grid Design */
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .game-item { background: var(--card); border: 1px solid #222; border-radius: 20px; padding: 15px; transition: 0.3s; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .game-item:active { transform: scale(0.95); border-color: var(--neon); }
        
        /* Official HD Logos */
        .game-item img { width: 100%; max-width: 90px; height: 90px; border-radius: 18px; object-fit: cover; margin-bottom: 12px; border: 1px solid #333; }
        .game-item p { margin: 0; font-size: 10px; font-weight: 800; font-family: 'Orbitron'; letter-spacing: 0.5px; color: #fff; text-transform: uppercase; }
        .badge-hot { position: absolute; top: 10px; right: 10px; background: #ff0000; color: #fff; font-size: 8px; padding: 3px 7px; border-radius: 5px; font-weight: bold; box-shadow: 0 0 10px #ff0000; }
    </style>
</head>
