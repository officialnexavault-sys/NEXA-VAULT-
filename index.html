<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa-Vault | Access Gate</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* गेम्स ग्रिड को सुंदर बनाने के लिए छोटा सा CSS */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-height: 300px; /* ज़्यादा गेम्स होने पर स्क्रॉल होगा */
            overflow-y: auto;
            padding: 5px;
        }
        .game-opt {
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 8px;
            text-align: center;
            transition: 0.3s;
        }
        .game-opt:active { transform: scale(0.9); border-color: #00f2ff; }
        .game-opt img { width: 100%; border-radius: 8px; margin-bottom: 5px; }
        .game-opt span { color: white; font-size: 9px; display: block; font-weight: 600; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="app-wrapper">
    <span class="logo-text">NEXA-VAULT</span>

    <div id="step-1" class="auth-card">
        <button onclick="document.getElementById('step-1').style.display='none'; document.getElementById('step-2').style.display='block';" class="main-btn" style="background:white; color:black; opacity:1;">
            <img src="https://www.google.com/favicon.ico" width="18"> SIGN IN WITH GOOGLE
        </button>
    </div>

    <div id="step-2" class="auth-card" style="display:none; width: 90%;">
        <h4 style="font-size:12px; margin-bottom:15px; color:#00f2ff; text-align: center;">SELECT YOUR GAME</h4>
        <div class="game-grid">
            
            <div class="game-opt" onclick="saveGame('FREE FIRE')"><img src="assets/ff.png"><span>FREE FIRE</span></div>
            <div class="game-opt" onclick="saveGame('BGMI')"><img src="assets/bgmi.png"><span>BGMI</span></div>
            <div class="game-opt" onclick="saveGame('COD MOBILE')"><img src="assets/cod.png"><span>COD MOBILE</span></div>
            <div class="game-opt" onclick="saveGame('BLOOD STRIKE')"><img src="assets/blood.png"><span>BLOOD STRIKE</span></div>
            <div class="game-opt" onclick="saveGame('FARLIGHT 84')"><img src="assets/farlight.png"><span>FARLIGHT 84</span></div>
            <div class="game-opt" onclick="saveGame('HONOR OF KINGS')"><img src="assets/hok.png"><span>H.O.K</span></div>
            <div class="game-opt" onclick="saveGame('VALORANT')"><img src="assets/val.png"><span>VALORANT</span></div>
            <div class="game-opt" onclick="saveGame('MINECRAFT')"><img src="assets/mc.png"><span>MINECRAFT</span></div>
            <div class="game-opt" onclick="saveGame('GTA V')"><img src="assets/gta5.png"><span>GTA V</span></div>
            <div class="game-opt" onclick="saveGame('CLASH ROYALE')"><img src="assets/royale.png"><span>C. ROYALE</span></div>
            <div class="game-opt" onclick="saveGame('LUDO KING')"><img src="assets/ludo.png"><span>LUDO KING</span></div>
            <div class="game-opt" onclick="saveGame('8 BALL POOL')"><img src="assets/pool.png"><span>8 BALL POOL</span></div>
            <div class="game-opt" onclick="saveGame('STUMBLE GUYS')"><img src="assets/stumble.png"><span>STUMBLE GUYS</span></div>
            <div class="game-opt" onclick="saveGame('ROBLOX')"><img src="assets/roblox.png"><span>ROBLOX</span></div>
            <div class="game-opt" onclick="saveGame('CLASH OF CLANS')"><img src="assets/coc.png"><span>C.O.C</span></div>
            <div class="game-opt" onclick="saveGame('MLBB')"><img src="assets/mlbb.png"><span>MLBB</span></div>

        </div>
    </div>

    <div id="step-3" class="auth-card" style="display:none;">
        <input type="number" id="u_id" placeholder="ENTER UID" style="width:100%; padding:12px; margin-bottom:10px; background:#000; border:1px solid #333; color:white; border-radius:8px;">
        <input type="text" id="u_nick" placeholder="NICKNAME" style="width:100%; padding:12px; margin-bottom:15px; background:#000; border:1px solid #333; color:white; border-radius:8px;">
        
        <button onclick="if(document.getElementById('u_id').value.length > 5){ window.location.href='dashboard.html'; }else{ alert('ID सही डालें!'); }" class="main-btn" style="opacity:1;">CONFIRM & ENTER</button>
    </div>
</div>

<script>
    function saveGame(gameName) {
        localStorage.setItem('game', gameName);
        document.getElementById('step-2').style.display='none'; 
        document.getElementById('step-3').style.display='block';
    }
</script>
</body>
</html>
