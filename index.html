<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa-Vault | Access Gate</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-wrapper">
    <span class="logo-text">NEXA-VAULT</span>

    <div id="step-1" class="auth-card">
        <button onclick="document.getElementById('step-1').style.display='none'; document.getElementById('step-2').style.display='block';" class="main-btn" style="background:white; color:black; opacity:1;">
            <img src="https://www.google.com/favicon.ico" width="18"> SIGN IN WITH GOOGLE
        </button>
    </div>

    <div id="step-2" class="auth-card" style="display:none;">
        <h4 style="font-size:12px; margin-bottom:15px; color:#00f2ff;">SELECT GAME</h4>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <button onclick="localStorage.setItem('game','FF'); document.getElementById('step-2').style.display='none'; document.getElementById('step-3').style.display='block';" class="game-opt" style="background:#000; border:1px solid #333; color:white; padding:10px; border-radius:5px;">FREE FIRE</button>
            <button onclick="localStorage.setItem('game','BGMI'); document.getElementById('step-2').style.display='none'; document.getElementById('step-3').style.display='block';" class="game-opt" style="background:#000; border:1px solid #333; color:white; padding:10px; border-radius:5px;">BGMI</button>
        </div>
    </div>

    <div id="step-3" class="auth-card" style="display:none;">
        <input type="number" id="u_id" placeholder="ENTER UID" style="width:100%; padding:12px; margin-bottom:10px; background:#000; border:1px solid #333; color:white; border-radius:8px;">
        <input type="text" id="u_nick" placeholder="NICKNAME" style="width:100%; padding:12px; margin-bottom:15px; background:#000; border:1px solid #333; color:white; border-radius:8px;">
        
        <button onclick="if(document.getElementById('u_id').value.length > 5){ window.location.href='dashboard.html'; }else{ alert('ID सही डालें!'); }" class="main-btn" style="opacity:1;">CONFIRM & ENTER</button>
    </div>
</div>
</body>
</html>
